<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 可视化编辑器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#313244;padding:10px 16px;border-bottom:1px solid #45475a;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
header h1{font-size:17px;font-weight:600;color:#89b4fa;white-space:nowrap}
.btn{background:#45475a;color:#cdd6f4;border:1px solid #585b70;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap}
.btn:hover{background:#585b70;border-color:#7f849c}
.btn-primary{background:#89b4fa;color:#1e1e2e;border-color:#89b4fa}
.btn-primary:hover{background:#b4befe;border-color:#b4befe}
.btn-danger{background:#f38ba8;color:#1e1e2e;border-color:#f38ba8}
.btn-danger:hover{background:#eba0ac;border-color:#eba0ac}
.btn-sm{padding:3px 8px;font-size:11px}

.toolbar-row{display:flex;align-items:center;gap:6px;width:100%}
.toolbar-secondary{margin-top:6px;display:none;align-items:center;gap:8px;width:100%}
.toolbar-secondary.show{display:flex}

.search-box{display:flex;align-items:center;background:#181825;border:1px solid #45475a;border-radius:6px;padding:0 8px;flex:1;max-width:340px;position:relative}
.search-box input{background:transparent;border:none;color:#cdd6f4;font-size:13px;padding:6px 4px;outline:none;width:100%;font-family:inherit}
.search-box input::placeholder{color:#6c7086}
.search-icon{color:#6c7086;font-size:14px;flex-shrink:0;margin-right:4px}
.search-badge{background:#89b4fa;color:#1e1e2e;border-radius:10px;font-size:11px;padding:1px 6px;font-weight:600;min-width:20px;text-align:center;flex-shrink:0}

.search-results{position:absolute;top:100%;left:0;right:0;background:#313244;border:1px solid #45475a;border-radius:8px;max-height:280px;overflow-y:auto;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.4);margin-top:4px;display:none}
.search-results.show{display:block}
.search-result-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #45475a;display:flex;justify-content:space-between;align-items:center;gap:8px}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#45475a}
.search-result-path{color:#89b4fa;font-family:"JetBrains Mono",monospace;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-preview{color:#a6e3a1;font-family:"JetBrains Mono",monospace;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50%}
mark{background:rgba(249,226,175,.35);color:#f9e2af;border-radius:2px;padding:0 1px}

.schema-area{flex:1;max-width:500px}
.schema-toggle{font-size:12px;color:#7f849c;cursor:pointer;white-space:nowrap}
.schema-toggle:hover{color:#cdd6f4}

.path-display{font-size:11px;color:#7f849c;margin-left:auto;font-family:"JetBrains Mono",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}

main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

#tree-container{flex:1;overflow:auto;padding:14px 18px;min-height:0}
.json-tree{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:13px;line-height:1.65;user-select:none}
.json-tree ul{list-style:none;padding-left:22px;border-left:1px dashed #45475a;margin-left:10px}
.json-tree>ul{padding-left:0;border-left:none;margin-left:0}
.tree-node{position:relative;padding:1px 4px;border-radius:4px;transition:background .15s}
.tree-node:hover{background:rgba(137,180,250,.08)}
.tree-node.drag-over-top::before,.tree-node.drag-over-bottom::after{content:'';position:absolute;left:0;right:0;height:2px;background:#89b4fa;border-radius:2px}
.tree-node.drag-over-top::before{top:0}
.tree-node.drag-over-bottom::after{bottom:0}
.tree-node.dragging{opacity:.4}
.tree-node.search-highlight{background:rgba(249,226,175,.15);outline:1px solid rgba(249,226,175,.3);border-radius:4px}
.tree-node.search-highlight-current{background:rgba(249,226,175,.3);outline:2px solid #f9e2af}

.node-row{display:inline-flex;align-items:center;gap:5px;min-height:26px;width:100%}
.toggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;cursor:pointer;border-radius:3px;transition:all .15s;flex-shrink:0;color:#7f849c}
.toggle:hover{background:#45475a;color:#cdd6f4}
.toggle.empty{visibility:hidden;cursor:default}
.toggle svg{width:10px;height:10px;transition:transform .15s}
.toggle.expanded svg{transform:rotate(90deg)}

.key{color:#f9e2af;font-weight:500;cursor:default;position:relative}
.key::after{content:':';color:#6c7086;margin-right:4px;margin-left:1px}
.key,.value{padding:1px 4px;border-radius:3px}
.value{cursor:pointer;position:relative}
.value:hover{background:rgba(137,180,250,.15)}
.value.string{color:#a6e3a1}
.value.number{color:#fab387}
.value.boolean{color:#cba6f7;font-weight:600}
.value.null{color:#f38ba8;font-style:italic;font-weight:600}
.value.object,.value.array{color:#89dceb}
.value.error{background:rgba(243,139,168,.25)!important;outline:1px solid #f38ba8;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.bracket{color:#89dceb}

.schema-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;font-size:9px;font-weight:700;margin-left:3px;flex-shrink:0;cursor:help;position:relative}
.schema-badge.error{background:#f38ba8;color:#1e1e2e}
.schema-badge.warning{background:#f9e2af;color:#1e1e2e}

.editable-input{background:#313244;border:1px solid #89b4fa;color:inherit;font:inherit;padding:2px 6px;border-radius:4px;outline:none;min-width:100px}
.editable-input:focus{box-shadow:0 0 0 2px rgba(137,180,250,.3)}
.editable-input.invalid{border-color:#f38ba8;background:rgba(243,139,168,.15);box-shadow:0 0 0 2px rgba(243,139,168,.2)}
.type-selector{background:#313244;border:1px solid #45475a;color:#cdd6f4;font:inherit;padding:2px 4px;border-radius:4px;margin-right:3px;cursor:pointer;font-size:12px}
.key-input{background:#313244;border:1px solid #89b4fa;color:#f9e2af;font:inherit;padding:2px 6px;border-radius:4px;outline:none;width:140px}
.key-input:focus{box-shadow:0 0 0 2px rgba(137,180,250,.3)}

.edit-tooltip{position:absolute;bottom:100%;left:0;background:#f38ba8;color:#1e1e2e;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;z-index:100;white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(243,139,168,.3);margin-bottom:4px}
.edit-tooltip::after{content:'';position:absolute;top:100%;left:16px;border:5px solid transparent;border-top-color:#f38ba8}
.edit-tooltip .tt-path{font-family:"JetBrains Mono",monospace;font-size:10px;opacity:.8;display:block;margin-top:2px}

.context-menu{position:fixed;background:#313244;border:1px solid #45475a;border-radius:8px;padding:6px;min-width:200px;z-index:10000;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.context-menu-item{padding:7px 12px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .1s}
.context-menu-item:hover{background:#45475a}
.context-menu-item.danger{color:#f38ba8}
.context-menu-item.danger:hover{background:rgba(243,139,168,.15)}
.context-menu-separator{height:1px;background:#45475a;margin:4px 6px}
.context-menu-icon{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

.error-banner{position:fixed;top:60px;right:16px;background:#f38ba8;color:#1e1e2e;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(243,139,168,.4);animation:slideIn .3s;max-width:380px;word-break:break-all}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.error-path{font-family:"JetBrains Mono",monospace;background:rgba(30,30,46,.2);padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block;font-size:11px}

.schema-panel{background:#181825;border-bottom:1px solid #45475a;flex-shrink:0;overflow:hidden;transition:max-height .3s;max-height:0}
.schema-panel.open{max-height:260px}
.schema-panel-inner{padding:10px 16px;display:flex;flex-direction:column;gap:8px}
.schema-panel-inner textarea{background:#11111b;color:#cdd6f4;border:1px solid #45475a;border-radius:6px;padding:8px 12px;font-family:"JetBrains Mono",monospace;font-size:12px;line-height:1.5;resize:vertical;min-height:80px;max-height:160px;outline:none}
.schema-panel-inner textarea:focus{border-color:#89b4fa}
.schema-panel-bar{display:flex;align-items:center;gap:8px}
.schema-status{font-size:11px;flex:1}
.schema-status.ok{color:#a6e3a1}
.schema-status.err{color:#f38ba8}

footer{background:#313244;border-top:1px solid #45475a;display:flex;flex-direction:column;flex-shrink:0;max-height:40%;min-height:100px}
.footer-header{padding:6px 14px;background:#1e1e2e;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#7f849c;border-bottom:1px solid #45475a;gap:8px;flex-wrap:wrap}
.footer-header span{font-weight:600;white-space:nowrap}
.schema-summary{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;padding:2px 8px;border-radius:4px;background:rgba(243,139,168,.15);color:#f38ba8;white-space:nowrap}
.schema-summary:hover{background:rgba(243,139,168,.25)}
.schema-summary.clean{background:rgba(166,227,161,.15);color:#a6e3a1}
#raw-json{flex:1;background:#181825;color:#cdd6f4;border:none;padding:12px 16px;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:12px;line-height:1.5;resize:none;outline:none;overflow:auto;white-space:pre}
#raw-json:focus{background:#11111b}
.resizer{height:4px;cursor:ns-resize;background:transparent;transition:background .2s;flex-shrink:0}
.resizer:hover,.resizer.active{background:#89b4fa}
</style>
</head>
<body>

<header>
  <div class="toolbar-row">
    <h1>JSON 可视化编辑器</h1>
    <button class="btn btn-primary" id="btn-expand-all">展开全部</button>
    <button class="btn" id="btn-collapse-all">折叠全部</button>
    <button class="btn" id="btn-format">格式化</button>
    <button class="btn btn-danger" id="btn-clear">清空</button>
    <button class="btn" id="btn-sample">加载示例</button>
    <span class="schema-toggle" id="schema-toggle">▶ Schema 校验</span>
    <span class="path-display" id="current-path">$</span>
  </div>
  <div class="toolbar-secondary" id="search-row">
    <div class="search-box" id="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜索键名、值或路径… (Ctrl+F)" spellcheck="false">
      <span class="search-badge" id="search-badge" style="display:none">0</span>
      <div class="search-results" id="search-results"></div>
    </div>
    <button class="btn btn-sm" id="search-prev" title="上一个">↑</button>
    <button class="btn btn-sm" id="search-next" title="下一个">↓</button>
    <button class="btn btn-sm" id="search-clear">✕</button>
  </div>
</header>

<div class="schema-panel" id="schema-panel">
  <div class="schema-panel-inner">
    <div class="schema-panel-bar">
      <span style="font-size:12px;color:#7f849c">粘贴 JSON Schema 进行校验：</span>
      <button class="btn btn-sm btn-primary" id="btn-validate">校验</button>
      <button class="btn btn-sm" id="btn-clear-schema">清空 Schema</button>
      <span class="schema-status" id="schema-status"></span>
    </div>
    <textarea id="schema-input" spellcheck="false" placeholder='在此粘贴 JSON Schema，例如：{"type":"object","required":["name"],"properties":{"name":{"type":"string"},"age":{"type":"number","minimum":0}}}'></textarea>
  </div>
</div>

<main>
  <div id="tree-container">
    <div class="json-tree" id="json-tree"></div>
  </div>
  <div class="resizer" id="resizer"></div>
  <footer>
    <div class="footer-header">
      <span>📝 原始 JSON（可编辑同步到上方）</span>
      <span class="schema-summary" id="schema-summary" style="display:none"></span>
      <span id="json-stats">-</span>
    </div>
    <textarea id="raw-json" spellcheck="false" placeholder='在此粘贴 JSON...'></textarea>
  </footer>
</main>

<div class="context-menu" id="context-menu" style="display:none;"></div>
<div id="error-container"></div>

<script>
(function(){
'use strict';

var state = {
  data: null,
  expanded: new Set(['root']),
  schemaErrors: new Map(),
  searchMatches: [],
  searchCurrentIdx: -1,
  schema: null
};

var dragSrcPath = null;
var dragSrcParent = null;

var treeEl = document.getElementById('json-tree');
var rawJsonEl = document.getElementById('raw-json');
var statsEl = document.getElementById('json-stats');
var pathEl = document.getElementById('current-path');
var contextMenu = document.getElementById('context-menu');
var errorContainer = document.getElementById('error-container');
var resizer = document.getElementById('resizer');
var searchInput = document.getElementById('search-input');
var searchResults = document.getElementById('search-results');
var searchBadge = document.getElementById('search-badge');
var searchRow = document.getElementById('search-row');
var schemaPanel = document.getElementById('schema-panel');
var schemaInput = document.getElementById('schema-input');
var schemaStatus = document.getElementById('schema-status');
var schemaSummary = document.getElementById('schema-summary');

var SAMPLE_JSON = {
  "name": "张三",
  "age": 28,
  "isStudent": false,
  "email": "zhangsan@example.com",
  "config.version": "1.0.0",
  "data[backup]": "含方括号的键名",
  "path/to/file": "/usr/local/bin",
  "address": {
    "city": "北京",
    "district": "海淀区",
    "street": "中关村大街 1 号",
    "zip": "100080"
  },
  "hobbies": ["读书", "编程", "游泳"],
  "scores": {
    "数学": 95,
    "语文": 88,
    "英语": 92
  },
  "metadata": null,
  "friends": [
    {"name": "李四", "age": 26, "contact": {"phone": "13800138000"}},
    {"name": "王五", "age": 30, "contact": {"phone": "13900139000"}}
  ]
};

var SAMPLE_SCHEMA = {
  "type": "object",
  "required": ["name", "age", "email"],
  "properties": {
    "name": {"type": "string", "minLength": 1},
    "age": {"type": "number", "minimum": 0, "maximum": 150},
    "isStudent": {"type": "boolean"},
    "email": {"type": "string", "pattern": "^[^@]+@[^@]+\\.[^@]+$"},
    "address": {
      "type": "object",
      "required": ["city"],
      "properties": {
        "city": {"type": "string"},
        "zip": {"type": "string", "pattern": "^\\d{6}$"}
      }
    },
    "hobbies": {
      "type": "array",
      "items": {"type": "string"},
      "minItems": 1
    },
    "scores": {
      "type": "object",
      "additionalProperties": {"type": "number"}
    },
    "metadata": {}
  },
  "additionalProperties": false
};

function escapeKeyForPath(k) {
  return '["' + JSON.stringify(k).slice(1, -1) + '"]';
}

function buildPath(parent, key) {
  if (typeof key === 'number') return parent + '[' + key + ']';
  return parent + escapeKeyForPath(key);
}

function parsePath(path) {
  if (path === 'root') return [];
  var result = [];
  var i = 4;
  while (i < path.length) {
    if (path[i] === '[') {
      i++;
      if (i < path.length && path[i] === '"') {
        i++;
        var key = '';
        while (i < path.length) {
          if (path[i] === '\\') {
            key += path[i] + path[i + 1];
            i += 2;
          } else if (path[i] === '"') {
            i++;
            break;
          } else {
            key += path[i];
            i++;
          }
        }
        result.push(JSON.parse('"' + key + '"'));
        if (i < path.length && path[i] === ']') i++;
      } else {
        var num = '';
        while (i < path.length && path[i] !== ']') {
          num += path[i];
          i++;
        }
        result.push(Number(num));
        if (i < path.length) i++;
      }
    } else {
      i++;
    }
  }
  return result;
}

function buildPathFromParts(parts) {
  var p = 'root';
  for (var idx = 0; idx < parts.length; idx++) p = buildPath(p, parts[idx]);
  return p;
}

function getParentPath(path) {
  if (path === 'root') return null;
  var parts = parsePath(path);
  parts.pop();
  if (parts.length === 0) return 'root';
  return buildPathFromParts(parts);
}

function getKeyAtPath(path) {
  if (path === 'root') return null;
  var parts = parsePath(path);
  return parts[parts.length - 1];
}

function pathToDisplay(path) {
  if (path === 'root') return '$';
  var parts = parsePath(path);
  var s = '$';
  for (var idx = 0; idx < parts.length; idx++) {
    var p = parts[idx];
    if (typeof p === 'number') {
      s += '[' + p + ']';
    } else if (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(p)) {
      s += '.' + p;
    } else {
      s += '[' + JSON.stringify(p) + ']';
    }
  }
  return s;
}

function getValueAtPath(path) {
  if (path === 'root') return state.data;
  var parts = parsePath(path);
  var current = state.data;
  for (var idx = 0; idx < parts.length; idx++) current = current[parts[idx]];
  return current;
}

function setValueAtPath(path, value) {
  if (path === 'root') { state.data = value; return; }
  var parts = parsePath(path);
  var last = parts.pop();
  var current = state.data;
  for (var idx = 0; idx < parts.length; idx++) current = current[parts[idx]];
  current[last] = value;
}

function deleteAtPath(path) {
  if (path === 'root') return;
  var parts = parsePath(path);
  var last = parts.pop();
  var current = state.data;
  for (var idx = 0; idx < parts.length; idx++) current = current[parts[idx]];
  if (Array.isArray(current)) current.splice(Number(last), 1);
  else delete current[last];
}

function getType(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v;
}

function parseValue(str, targetType) {
  str = str.trim();
  if (targetType === 'string') return str;
  if (targetType === 'number') {
    if (str === '' || isNaN(Number(str))) throw new Error('无效的数字');
    return Number(str);
  }
  if (targetType === 'boolean') {
    if (str === 'true') return true;
    if (str === 'false') return false;
    throw new Error('布尔值必须为 true 或 false');
  }
  if (targetType === 'null') {
    if (str === 'null' || str === '') return null;
    throw new Error('null 值必须为 null');
  }
  if (targetType === 'array') {
    try {
      var v = JSON.parse(str);
      if (!Array.isArray(v)) throw new Error('不是数组');
      return v;
    } catch(e) { throw new Error('无效的 JSON 数组'); }
  }
  if (targetType === 'object') {
    try {
      var v2 = JSON.parse(str);
      if (typeof v2 !== 'object' || Array.isArray(v2) || v2 === null) throw new Error('不是对象');
      return v2;
    } catch(e2) { throw new Error('无效的 JSON 对象'); }
  }
  return str;
}

function expandAllChildren(path, value) {
  if (value && typeof value === 'object') {
    state.expanded.add(path);
    if (Array.isArray(value)) {
      value.forEach(function(v, i) { expandAllChildren(buildPath(path, i), v); });
    } else {
      Object.keys(value).forEach(function(k) { expandAllChildren(buildPath(path, k), value[k]); });
    }
  }
}

function expandToPath(path) {
  var parts = parsePath(path);
  var p = 'root';
  state.expanded.add(p);
  for (var idx = 0; idx < parts.length - 1; idx++) {
    p = buildPath(p, parts[idx]);
    state.expanded.add(p);
  }
}

function setData(data) {
  state.data = data;
  state.expanded = new Set(['root']);
  expandAllChildren('root', data);
  render();
  syncRawJson();
  if (state.schema) runSchemaValidation();
}

function render() {
  treeEl.innerHTML = '';
  renderNode(state.data, 'root', null, treeEl, true);
  updateStats();
  applySearchHighlights();
}

function renderNode(value, path, key, parent, isRoot) {
  var type = getType(value);
  var li = document.createElement('li');
  var nodeDiv = document.createElement('div');
  nodeDiv.className = 'tree-node';
  nodeDiv.dataset.path = path;
  nodeDiv.dataset.type = type;
  if (key !== null) nodeDiv.dataset.key = String(key);

  var row = document.createElement('div');
  row.className = 'node-row';

  var toggle = document.createElement('span');
  toggle.className = 'toggle';
  var hasChildren = type === 'object' || type === 'array';
  var childCount = hasChildren ? (Array.isArray(value) ? value.length : Object.keys(value).length) : 0;
  if (!hasChildren || childCount === 0) toggle.classList.add('empty');
  var expanded = state.expanded.has(path);
  if (expanded && hasChildren) toggle.classList.add('expanded');
  toggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  row.appendChild(toggle);

  if (key !== null && !isRoot) {
    var keyEl = document.createElement('span');
    keyEl.className = 'key';
    keyEl.textContent = typeof key === 'number' ? String(key) : String(key);
    keyEl.dataset.path = path;
    (function(k, p, nd, tp) {
      keyEl.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        if (tp === 'array') return;
        startEditKey(nd, k, p);
      });
    })(key, path, nodeDiv, type);
    row.appendChild(keyEl);
  }

  if (hasChildren) {
    var bracketOpen = document.createElement('span');
    bracketOpen.className = 'bracket';
    bracketOpen.textContent = type === 'array' ? '[' : '{';
    row.appendChild(bracketOpen);

    if (!expanded && childCount > 0) {
      var collapsedInfo = document.createElement('span');
      collapsedInfo.style.cssText = 'color:#6c7086;font-size:11px;margin:0 2px';
      collapsedInfo.textContent = childCount + ' 项';
      row.appendChild(collapsedInfo);
    }

    var bracketClose = document.createElement('span');
    bracketClose.className = 'bracket';
    bracketClose.textContent = type === 'array' ? ']' : '}';
    row.appendChild(bracketClose);
  } else {
    var valueEl = document.createElement('span');
    valueEl.className = 'value ' + type;
    valueEl.textContent = type === 'string' ? JSON.stringify(value) : String(value);
    valueEl.dataset.path = path;
    (function(v, t, p) {
      valueEl.addEventListener('dblclick', function(e) {
        e.stopPropagation();
        startEditValue(valueEl, v, t, p);
      });
    })(value, type, path);
    row.appendChild(valueEl);
  }

  var schemaErrs = state.schemaErrors.get(path);
  if (schemaErrs && schemaErrs.length > 0) {
    var badge = document.createElement('span');
    badge.className = 'schema-badge ' + (schemaErrs.some(function(e){return e.severity==='error'}) ? 'error' : 'warning');
    badge.textContent = '!';
    badge.title = schemaErrs.map(function(e){return e.message}).join('\n');
    row.appendChild(badge);
  }

  nodeDiv.appendChild(row);
  li.appendChild(nodeDiv);

  if (hasChildren && expanded && childCount > 0) {
    var ul = document.createElement('ul');
    var entries;
    if (Array.isArray(value)) {
      entries = value.map(function(v, i) { return [i, v]; });
    } else {
      entries = Object.keys(value).map(function(k) { return [k, value[k]]; });
    }
    for (var ei = 0; ei < entries.length; ei++) {
      var ek = entries[ei][0], ev = entries[ei][1];
      renderNode(ev, buildPath(path, ek), ek, ul, false);
    }
    li.appendChild(ul);
  }

  parent.appendChild(li);

  if (hasChildren) {
    (function(p, cc) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        if (cc === 0) return;
        if (state.expanded.has(p)) state.expanded.delete(p);
        else state.expanded.add(p);
        render();
      });
    })(path, childCount);
  }

  setupDragAndDrop(nodeDiv, path, type, isRoot);
  nodeDiv.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showContextMenu(e.clientX, e.clientY, path, type, isRoot);
  });

  return li;
}

function startEditValue(el, value, type, path) {
  closeAllEdits();
  var container = document.createElement('span');
  container.style.cssText = 'display:inline-flex;align-items:center;position:relative';

  var typeSel = document.createElement('select');
  typeSel.className = 'type-selector';
  ['string','number','boolean','null','object','array'].forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    if (t === type) opt.selected = true;
    typeSel.appendChild(opt);
  });
  container.appendChild(typeSel);

  var input = document.createElement('input');
  input.className = 'editable-input';
  if (type === 'string') input.value = value;
  else if (type === 'object' || type === 'array') input.value = JSON.stringify(value);
  else input.value = String(value);
  if (type === 'null') { input.value = 'null'; input.readOnly = true; }
  container.appendChild(input);

  var tooltip = document.createElement('div');
  tooltip.className = 'edit-tooltip';
  tooltip.style.display = 'none';
  container.appendChild(tooltip);

  el.replaceWith(container);
  input.focus();
  input.select();

  function showEditError(msg) {
    tooltip.textContent = '';
    tooltip.style.display = 'block';
    var msgSpan = document.createElement('span');
    msgSpan.textContent = '⚠ ' + msg;
    tooltip.appendChild(msgSpan);
    var pathSpan = document.createElement('span');
    pathSpan.className = 'tt-path';
    pathSpan.textContent = pathToDisplay(path);
    tooltip.appendChild(pathSpan);
    input.classList.add('invalid');
  }

  function hideEditError() {
    tooltip.style.display = 'none';
    input.classList.remove('invalid');
  }

  function commit() {
    var newType = typeSel.value;
    try {
      var newValue = parseValue(input.value, newType);
      setValueAtPath(path, newValue);
      hideEditError();
      if (newType === 'object' || newType === 'array') {
        expandAllChildren(path, newValue);
      }
      render();
      syncRawJson();
      if (state.schema) runSchemaValidation();
    } catch (err) {
      input.classList.add('invalid');
      showEditError(err.message);
    }
  }

  function cancel() { render(); }

  input.addEventListener('input', function() {
    var newType = typeSel.value;
    try {
      parseValue(input.value, newType);
      hideEditError();
    } catch (err) {
      showEditError(err.message);
    }
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });

  typeSel.addEventListener('change', function() {
    var t = typeSel.value;
    input.readOnly = t === 'null';
    if (t === 'null') { input.value = 'null'; hideEditError(); }
    else if (t === 'boolean' && input.value !== 'true' && input.value !== 'false') input.value = 'true';
    else if (t === 'number' && input.value === '') input.value = '0';
    input.dispatchEvent(new Event('input'));
  });

  var clickHandler = function(e) {
    if (!container.contains(e.target)) { cancel(); document.removeEventListener('click', clickHandler); }
  };
  setTimeout(function() { document.addEventListener('click', clickHandler); }, 0);
  container.addEventListener('click', function(e) { e.stopPropagation(); });
}

function startEditKey(nodeDiv, oldKey, path) {
  var row = nodeDiv.querySelector('.node-row');
  var keyEl = row.querySelector('.key');
  if (!keyEl) return;

  var input = document.createElement('input');
  input.className = 'key-input';
  input.value = String(oldKey);
  keyEl.replaceWith(input);
  input.focus();
  input.select();

  var parentPath = getParentPath(path);
  var parentValue = getValueAtPath(parentPath);

  function commit() {
    var newKey = input.value;
    if (!newKey) { render(); return; }
    if (newKey === String(oldKey)) { render(); return; }
    if (Object.prototype.hasOwnProperty.call(parentValue, newKey)) {
      showErrorBanner('键名已存在: ' + newKey, path);
      return;
    }
    var entries = Object.entries(parentValue);
    var idx = -1;
    for (var i = 0; i < entries.length; i++) {
      if (entries[i][0] === String(oldKey)) { idx = i; break; }
    }
    entries[idx] = [newKey, entries[idx][1]];
    var newObj = {};
    for (var j = 0; j < entries.length; j++) newObj[entries[j][0]] = entries[j][1];
    setValueAtPath(parentPath, newObj);
    render();
    syncRawJson();
    if (state.schema) runSchemaValidation();
  }

  function cancel() { render(); }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });

  var clickHandler = function(e) {
    if (e.target !== input) { cancel(); document.removeEventListener('click', clickHandler); }
  };
  setTimeout(function() { document.addEventListener('click', clickHandler); }, 0);
  input.addEventListener('click', function(e) { e.stopPropagation(); });
}

function closeAllEdits() {}

function setupDragAndDrop(nodeDiv, path, type, isRoot) {
  nodeDiv.draggable = !isRoot;

  nodeDiv.addEventListener('dragstart', function(e) {
    e.stopPropagation();
    if (isRoot) { e.preventDefault(); return; }
    var parentPath = getParentPath(path);
    if (!parentPath) { e.preventDefault(); return; }
    dragSrcPath = path;
    dragSrcParent = parentPath;
    nodeDiv.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', path);
  });

  nodeDiv.addEventListener('dragend', function() {
    nodeDiv.classList.remove('dragging');
    dragSrcPath = null;
    dragSrcParent = null;
    document.querySelectorAll('.tree-node').forEach(function(n) {
      n.classList.remove('drag-over-top','drag-over-bottom');
    });
  });

  nodeDiv.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!dragSrcParent) return;
    var tgtParent = getParentPath(path);
    if (dragSrcParent !== tgtParent) return;
    var rect = nodeDiv.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    nodeDiv.classList.remove('drag-over-top','drag-over-bottom');
    nodeDiv.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  });

  nodeDiv.addEventListener('dragleave', function(e) {
    if (!nodeDiv.contains(e.relatedTarget)) {
      nodeDiv.classList.remove('drag-over-top','drag-over-bottom');
    }
  });

  nodeDiv.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (!dragSrcPath || dragSrcPath === path) return;

    var srcParentPath = dragSrcParent;
    var tgtParentPath = getParentPath(path);
    if (srcParentPath !== tgtParentPath) return;

    if (path.startsWith(dragSrcPath + '[')) return;

    var rect = nodeDiv.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    var insertBefore = e.clientY < mid;

    nodeDiv.classList.remove('drag-over-top','drag-over-bottom');

    var srcKey = getKeyAtPath(dragSrcPath);
    var tgtKey = getKeyAtPath(path);
    var parent = getValueAtPath(srcParentPath);
    var isArray = Array.isArray(parent);

    if (isArray) {
      var srcIdx = Number(srcKey);
      var tgtIdx = Number(tgtKey);
      var moved = parent[srcIdx];
      parent.splice(srcIdx, 1);
      if (srcIdx < tgtIdx) tgtIdx--;
      var finalIdx = insertBefore ? tgtIdx : tgtIdx + 1;
      parent.splice(finalIdx, 0, moved);
    } else {
      var srcK = String(srcKey);
      var tgtK = String(tgtKey);
      var keys = Object.keys(parent);
      var srcIdx2 = -1;
      for (var i = 0; i < keys.length; i++) { if (keys[i] === srcK) { srcIdx2 = i; break; } }
      keys.splice(srcIdx2, 1);
      var tgtIdx2 = -1;
      for (var j = 0; j < keys.length; j++) { if (keys[j] === tgtK) { tgtIdx2 = j; break; } }
      var finalIdx2 = insertBefore ? tgtIdx2 : tgtIdx2 + 1;
      keys.splice(finalIdx2, 0, srcK);
      var newObj = {};
      for (var k = 0; k < keys.length; k++) newObj[keys[k]] = parent[keys[k]];
      setValueAtPath(srcParentPath, newObj);
    }
    render();
    syncRawJson();
  });
}

function showContextMenu(x, y, path, type, isRoot) {
  var items = [];

  if (!isRoot) {
    items.push({label:'➕ 添加同级键值对', icon:'＋', action:function(){addSibling(path)}});
  }
  if (type === 'object') {
    items.push({label:'➕ 添加子键值对', icon:'↳', action:function(){addChild(path,'object')}});
  }
  if (type === 'array') {
    items.push({label:'➕ 添加子元素', icon:'↳', action:function(){addChild(path,'array')}});
  }
  items.push({separator:true});
  items.push({label:'📋 复制当前路径', icon:'⧉', action:function(){copyPath(path)}});
  items.push({label:'📋 复制 JSON 值', icon:'{ }', action:function(){copyJsonValue(path)}});
  if (!isRoot) {
    items.push({separator:true});
    items.push({label:'🗑 删除该节点', icon:'✕', danger:true, action:function(){deleteNode(path)}});
  }

  contextMenu.innerHTML = '';
  items.forEach(function(item) {
    if (item.separator) {
      var sep = document.createElement('div');
      sep.className = 'context-menu-separator';
      contextMenu.appendChild(sep);
    } else {
      var div = document.createElement('div');
      div.className = 'context-menu-item' + (item.danger ? ' danger' : '');
      div.innerHTML = '<span class="context-menu-icon">' + item.icon + '</span><span>' + item.label + '</span>';
      div.addEventListener('click', function() { hideContextMenu(); item.action(); });
      contextMenu.appendChild(div);
    }
  });

  contextMenu.style.display = 'block';
  requestAnimationFrame(function() {
    var rect = contextMenu.getBoundingClientRect();
    var vw = window.innerWidth, vh = window.innerHeight;
    contextMenu.style.left = (x + rect.width > vw ? vw - rect.width - 10 : x) + 'px';
    contextMenu.style.top = (y + rect.height > vh ? vh - rect.height - 10 : y) + 'px';
  });
}

function hideContextMenu() { contextMenu.style.display = 'none'; }

function addSibling(path) {
  var parentPath = getParentPath(path);
  var parent = getValueAtPath(parentPath);
  var key = getKeyAtPath(path);

  if (Array.isArray(parent)) {
    var idx = Number(key);
    parent.splice(idx + 1, 0, '新元素');
  } else {
    var newKey = 'newKey', counter = 1;
    while (newKey in parent) newKey = 'newKey' + (++counter);
    var keys = Object.keys(parent);
    var tgtIdx = -1;
    for (var i = 0; i < keys.length; i++) { if (keys[i] === String(key)) { tgtIdx = i; break; } }
    var newObj = {};
    for (var j = 0; j <= tgtIdx; j++) newObj[keys[j]] = parent[keys[j]];
    newObj[newKey] = '新值';
    for (var k = tgtIdx + 1; k < keys.length; k++) newObj[keys[k]] = parent[keys[k]];
    setValueAtPath(parentPath, newObj);
  }
  state.expanded.add(parentPath);
  render();
  syncRawJson();
  if (state.schema) runSchemaValidation();
}

function addChild(path, parentType) {
  var parent = getValueAtPath(path);
  state.expanded.add(path);
  if (parentType === 'array') {
    parent.push('新元素');
  } else {
    var newKey = 'newKey', counter = 1;
    while (newKey in parent) newKey = 'newKey' + (++counter);
    parent[newKey] = '新值';
  }
  render();
  syncRawJson();
  if (state.schema) runSchemaValidation();
}

function deleteNode(path) {
  var display = pathToDisplay(path);
  if (!confirm('确认删除节点: ' + display + ' ?')) return;
  deleteAtPath(path);
  render();
  syncRawJson();
  if (state.schema) runSchemaValidation();
}

function copyPath(path) {
  var display = pathToDisplay(path);
  navigator.clipboard.writeText(display).then(function() { showTemp('✓ 路径已复制: ' + display); });
}

function copyJsonValue(path) {
  var val = getValueAtPath(path);

  navigator.clipboard.writeText(str).then(function() { showTemp('✓ JSON 值已复制'); });
}

function syncRawJson() {
  try {
    rawJsonEl.value = JSON.stringify(state.data, null, 2);

function updateStats() {
  var count = 0;
  function walk(v) {
    count++;
    if (v && typeof v === 'object') {
      if (Array.isArray(v)) v.forEach(walk);
      else Object.values(v).forEach(walk);
    }
  }
  walk(state.data);
  var size = new Blob([JSON.stringify(state.data)]).size;
  statsEl.textContent = '节点: ' + count + '  |  大小: ' + size + ' B';
  updateSchemaSummary();
}

function validateSchema(data, schema, path) {
  var errors = [];
  if (!schema || typeof schema !== 'object') return errors;

  if (schema.type) {
    var actualType = getType(data);
    var typeMatch = false;
    if (Array.isArray(schema.type)) {
      typeMatch = schema.type.some(function(t) { return actualType === t || (t === 'integer' && actualType === 'number' && data % 1 === 0); });
    } else {
      typeMatch = actualType === schema.type || (schema.type === 'integer' && actualType === 'number' && data % 1 === 0);
    }
    if (!typeMatch) {
      errors.push({path: path, message: '类型应为 ' + schema.type + '，实际为 ' + actualType, severity: 'error'});
    }
  }

  if (schema.enum && schema.enum.indexOf(data) === -1) {
    errors.push({path: path, message: '值不在允许的枚举范围内', severity: 'error'});
  }

  if (typeof data === 'number') {
    if (schema.minimum !== undefined && data < schema.minimum) {
      errors.push({path: path, message: '值 ' + data + ' 小于最小值 ' + schema.minimum, severity: 'error'});
    }
    if (schema.maximum !== undefined && data > schema.maximum) {
      errors.push({path: path, message: '值 ' + data + ' 大于最大值 ' + schema.maximum, severity: 'error'});
    }
    if (schema.exclusiveMinimum !== undefined && data <= schema.exclusiveMinimum) {
      errors.push({path: path, message: '值 ' + data + ' 不大于 ' + schema.exclusiveMinimum, severity: 'error'});
    }
    if (schema.exclusiveMaximum !== undefined && data >= schema.exclusiveMaximum) {
      errors.push({path: path, message: '值 ' + data + ' 不小于 ' + schema.exclusiveMaximum, severity: 'error'});
    }
  }

  if (typeof data === 'string') {
    if (schema.minLength !== undefined && data.length < schema.minLength) {
      errors.push({path: path, message: '字符串长度 ' + data.length + ' 小于最小长度 ' + schema.minLength, severity: 'error'});
    }
    if (schema.maxLength !== undefined && data.length > schema.maxLength) {
      errors.push({path: path, message: '字符串长度 ' + data.length + ' 大于最大长度 ' + schema.maxLength, severity: 'error'});
    }
    if (schema.pattern) {
      try {
        var re = new RegExp(schema.pattern);
        if (!re.test(data)) {
          errors.push({path: path, message: '字符串不匹配模式 ' + schema.pattern, severity: 'error'});
        }
      } catch(e) {}
    }
  }

  if (Array.isArray(data)) {
    if (schema.minItems !== undefined && data.length < schema.minItems) {
      errors.push({path: path, message: '数组长度 ' + data.length + ' 小于最小项数 ' + schema.minItems, severity: 'error'});
    }
    if (schema.maxItems !== undefined && data.length > schema.maxItems) {
      errors.push({path: path, message: '数组长度 ' + data.length + ' 大于最大项数 ' + schema.maxItems, severity: 'error'});
    }
    if (schema.items && typeof schema.items === 'object') {
      for (var i = 0; i < data.length; i++) {
        var childErrors = validateSchema(data[i], schema.items, buildPath(path, i));
        errors = errors.concat(childErrors);
      }
    }
    if (schema.uniqueItems && new Set(data).size !== data.length) {
      errors.push({path: path, message: '数组包含重复项', severity: 'error'});
    }
  }

  if (data && typeof data === 'object' && !Array.isArray(data)) {
    if (schema.required) {
      for (var ri = 0; ri < schema.required.length; ri++) {
        var reqKey = schema.required[ri];
        if (!Object.prototype.hasOwnProperty.call(data, reqKey)) {
          errors.push({path: path, message: '缺少必填字段: ' + reqKey, severity: 'error'});
        }
      }
    }

    if (schema.properties) {
      var propKeys = Object.keys(schema.properties);
      for (var pi = 0; pi < propKeys.length; pi++) {
        var pk = propKeys[pi];
        if (Object.prototype.hasOwnProperty.call(data, pk)) {
          var propErrors = validateSchema(data[pk], schema.properties[pk], buildPath(path, pk));
          errors = errors.concat(propErrors);
        }
      }
    }

    if (schema.additionalProperties === false && schema.properties) {
      var propSet = new Set(Object.keys(schema.properties));
      var dataKeys = Object.keys(data);
      for (var ai = 0; ai < dataKeys.length; ai++) {
        if (!propSet.has(dataKeys[ai])) {
          errors.push({path: buildPath(path, dataKeys[ai]), message: '不允许的额外属性: ' + dataKeys[ai], severity: 'warning'});
        }
      }
    } else if (schema.additionalProperties && typeof schema.additionalProperties === 'object' && schema.properties) {
      var propSet2 = new Set(Object.keys(schema.properties));
      var dataKeys2 = Object.keys(data);
      for (var aj = 0; aj < dataKeys2.length; aj++) {
        if (!propSet2.has(dataKeys2[aj])) {
          var addPropErrors = validateSchema(data[dataKeys2[aj]], schema.additionalProperties, buildPath(path, dataKeys2[aj]));
          errors = errors.concat(addPropErrors);
        }
      }
    }
  }

  return errors;
}

function runSchemaValidation() {
  state.schemaErrors.clear();
  if (!state.schema) { render(); return; }
  var errors = validateSchema(state.data, state.schema, 'root');
  for (var i = 0; i < errors.length; i++) {
    var p = errors[i].path;
    if (!state.schemaErrors.has(p)) state.schemaErrors.set(p, []);
    state.schemaErrors.get(p).push(errors[i]);
  }
  render();
  updateSchemaSummary();
}

function updateSchemaSummary() {
  if (!state.schema) {
    schemaSummary.style.display = 'none';
    return;
  }
  schemaSummary.style.display = 'inline-flex';
  var total = 0;
  state.schemaErrors.forEach(function(v) { total += v.length; });
  if (total === 0) {
    schemaSummary.className = 'schema-summary clean';
    schemaSummary.textContent = '✓ Schema 校验通过';
  } else {
    schemaSummary.className = 'schema-summary';
    schemaSummary.textContent = '⚠ ' + total + ' 个 Schema 问题';
  }
}

schemaSummary.addEventListener('click', function() {
  if (state.schemaErrors.size === 0) return;
  var firstErrPath = state.schemaErrors.keys().next().value;
  navigateToPath(firstErrPath);
});

var searchDebounceTimer = null;

function performSearch(query) {
  state.searchMatches = [];
  state.searchCurrentIdx = -1;
  if (!query) {
    searchResults.classList.remove('show');
    searchBadge.style.display = 'none';
    applySearchHighlights();
    return;
  }

  var lq = query.toLowerCase();
  var results = [];

  function walk(value, path, key) {
    var display = pathToDisplay(path);
    var keyStr = key !== null ? String(key) : '';
    var valStr = value === null ? 'null' : (typeof value === 'object' ? JSON.stringify(value) : String(value));
    var matched = false;

    if (keyStr.toLowerCase().indexOf(lq) !== -1) matched = true;
    if (valStr.toLowerCase().indexOf(lq) !== -1) matched = true;
    if (display.toLowerCase().indexOf(lq) !== -1) matched = true;

    if (matched) {
      results.push({
        path: path,
        key: keyStr,
        preview: valStr.length > 60 ? valStr.substring(0, 60) + '…' : valStr,
        display: display
      });
      if (results.length >= 200) return;
    }

    if (value && typeof value === 'object' && results.length < 200) {
      var entries;
      if (Array.isArray(value)) {
        entries = value.map(function(v, i) { return [i, v]; });
      } else {
        entries = Object.keys(value).map(function(k) { return [k, value[k]]; });
      }
      for (var i = 0; i < entries.length && results.length < 200; i++) {
        walk(entries[i][1], buildPath(path, entries[i][0]), entries[i][0]);
      }
    }
  }

  walk(state.data, 'root', null);
  state.searchMatches = results;

  searchBadge.style.display = results.length > 0 ? 'inline' : 'none';
  searchBadge.textContent = results.length;

  searchResults.innerHTML = '';
  if (results.length === 0) {
    searchResults.classList.remove('show');
    applySearchHighlights();
    return;
  }

  for (var i = 0; i < results.length; i++) {
    (function(r, idx) {
      var item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = '<span class="search-result-path">' + escapeHtml(r.display) + '</span><span class="search-result-preview">' + escapeHtml(r.preview) + '</span>';
      item.addEventListener('click', function() {
        navigateToPath(r.path);
        state.searchCurrentIdx = idx;
        applySearchHighlights();
      });
      searchResults.appendChild(item);
    })(results[i], i);
  }
  searchResults.classList.add('show');
  applySearchHighlights();
}

function applySearchHighlights() {
  document.querySelectorAll('.tree-node').forEach(function(n) {
    n.classList.remove('search-highlight','search-highlight-current');
  });
  if (state.searchMatches.length === 0) return;
  for (var i = 0; i < state.searchMatches.length; i++) {
    var node = document.querySelector('.tree-node[data-path="' + CSS.escape(state.searchMatches[i].path) + '"]');
    if (node) node.classList.add('search-highlight');
  }
  if (state.searchCurrentIdx >= 0 && state.searchCurrentIdx < state.searchMatches.length) {
    var curNode = document.querySelector('.tree-node[data-path="' + CSS.escape(state.searchMatches[state.searchCurrentIdx].path) + '"]');
    if (curNode) {
      curNode.classList.add('search-highlight-current');
      curNode.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }
}

function navigateToPath(path) {
  expandToPath(path);
  render();
  requestAnimationFrame(function() {
    var node = document.querySelector('.tree-node[data-path="' + CSS.escape(path) + '"]');
    if (node) {
      node.scrollIntoView({behavior:'smooth', block:'center'});
      node.style.transition = 'background .3s';
      node.style.background = 'rgba(137,180,250,0.2)';
      setTimeout(function() { node.style.background = ''; }, 1500);
    }
  });
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function init() {
  setData(JSON.parse(JSON.stringify(SAMPLE_JSON)));
  bindEvents();
}

function bindEvents() {
  document.addEventListener('click', function() {
    hideContextMenu();
    pathEl.textContent = '$';
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      hideContextMenu();
      hideErrorBanner();
      searchResults.classList.remove('show');
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      searchRow.classList.add('show');
      searchInput.focus();
    }
  });

  treeEl.addEventListener('mousemove', function(e) {
    var node = e.target.closest('.tree-node');
    if (node) pathEl.textContent = pathToDisplay(node.dataset.path);
  });

  rawJsonEl.addEventListener('input', function() {
    try {
      var parsed = JSON.parse(rawJsonEl.value);
      state.data = parsed;
      rawJsonEl.style.color = '#cdd6f4';
      state.expanded = new Set(['root']);
      expandAllChildren('root', state.data);
      render();
      hideErrorBanner();
      if (state.schema) runSchemaValidation();
    } catch (err) {
      rawJsonEl.style.color = '#f38ba8';
      showErrorBanner('JSON 语法错误: ' + err.message, 'root');
    }
  });

  document.getElementById('btn-expand-all').addEventListener('click', function() {
    state.expanded = new Set(['root']);
    expandAllChildren('root', state.data);
    render();
  });

  document.getElementById('btn-collapse-all').addEventListener('click', function() {
    state.expanded = new Set();
    render();
  });

  document.getElementById('btn-format').addEventListener('click', function() {
    try {
      state.data = JSON.parse(rawJsonEl.value);
      state.expanded = new Set(['root']);
      expandAllChildren('root', state.data);
      render();
      syncRawJson();
      showTemp('✓ 已格式化');
    } catch (err) {
      showErrorBanner('无法格式化: ' + err.message, 'root');
    }
  });

  document.getElementById('btn-clear').addEventListener('click', function() {
    if (!confirm('确认清空所有数据?')) return;
    setData({});
  });

  document.getElementById('btn-sample').addEventListener('click', function() {
    setData(JSON.parse(JSON.stringify(SAMPLE_JSON)));
    showTemp('✓ 已加载示例数据（含特殊键名）');
  });

  document.getElementById('schema-toggle').addEventListener('click', function() {
    schemaPanel.classList.toggle('open');
    this.textContent = schemaPanel.classList.contains('open') ? '▼ Schema 校验' : '▶ Schema 校验';
  });

  document.getElementById('btn-validate').addEventListener('click', function() {
    var schemaText = schemaInput.value.trim();
    if (!schemaText) {
      state.schema = null;
      state.schemaErrors.clear();
      schemaStatus.textContent = '';
      schemaStatus.className = 'schema-status';
      render();
      return;
    }
    try {
      state.schema = JSON.parse(schemaText);
      runSchemaValidation();
      var total = 0;
      state.schemaErrors.forEach(function(v) { total += v.length; });
      if (total === 0) {
        schemaStatus.textContent = '✓ 校验通过';
        schemaStatus.className = 'schema-status ok';
      } else {
        schemaStatus.textContent = '✗ 发现 ' + total + ' 个问题';
        schemaStatus.className = 'schema-status err';
      }
    } catch (err) {
      schemaStatus.textContent = '✗ Schema 语法错误: ' + err.message;
      schemaStatus.className = 'schema-status err';
    }
  });

  document.getElementById('btn-clear-schema').addEventListener('click', function() {
    schemaInput.value = '';
    state.schema = null;
    state.schemaErrors.clear();
    schemaStatus.textContent = '';
    schemaStatus.className = 'schema-status';
    render();
  });

  searchInput.addEventListener('input', function() {
    clearTimeout(searchDebounceTimer);
    var q = searchInput.value.trim();
    if (!q) {
      performSearch('');
      return;
    }
    searchDebounceTimer = setTimeout(function() { performSearch(q); }, 250);
  });

  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (state.searchMatches.length === 0) return;
      if (e.shiftKey) {
        state.searchCurrentIdx = (state.searchCurrentIdx - 1 + state.searchMatches.length) % state.searchMatches.length;
      } else {
        state.searchCurrentIdx = (state.searchCurrentIdx + 1) % state.searchMatches.length;
      }
      navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
      applySearchHighlights();
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      performSearch('');
      searchResults.classList.remove('show');
    }
  });

  document.getElementById('search-prev').addEventListener('click', function() {
    if (state.searchMatches.length === 0) return;
    state.searchCurrentIdx = (state.searchCurrentIdx - 1 + state.searchMatches.length) % state.searchMatches.length;
    navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
    applySearchHighlights();
  });

  document.getElementById('search-next').addEventListener('click', function() {
    if (state.searchMatches.length === 0) return;
    state.searchCurrentIdx = (state.searchCurrentIdx + 1) % state.searchMatches.length;
    navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
    applySearchHighlights();
  });

  document.getElementById('search-clear').addEventListener('click', function() {
    searchInput.value = '';
    performSearch('');
    searchResults.classList.remove('show');
    searchBadge.style.display = 'none';
  });

  document.addEventListener('click', function(e) {
    if (!document.getElementById('search-box').contains(e.target)) {
      searchResults.classList.remove('show');
    }
  });

  var resizing = false, startY, startHeight;
  resizer.addEventListener('mousedown', function(e) {
    resizing = true;
    resizer.classList.add('active');
    startY = e.clientY;
    var footer = resizer.nextElementSibling;
    startHeight = footer.offsetHeight;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!resizing) return;
    var delta = startY - e.clientY;
    var footer = resizer.nextElementSibling;
    var newHeight = Math.min(Math.max(100, startHeight + delta), window.innerHeight * 0.7);
    footer.style.height = newHeight + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (resizing) {
      resizing = false;
      resizer.classList.remove('active');
      document.body.style.userSelect = '';
    }
  });
}

init();
})();
</script>

</body>
</html>
