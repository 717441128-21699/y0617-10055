<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 可视化编辑器 - 配置工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#313244;padding:8px 14px;border-bottom:1px solid #45475a;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.toolbar-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:600;color:#89b4fa;white-space:nowrap;margin-right:4px}
.btn{background:#45475a;color:#cdd6f4;border:1px solid #585b70;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:#585b70;border-color:#7f849c}
.btn-primary{background:#89b4fa;color:#1e1e2e;border-color:#89b4fa}
.btn-primary:hover{background:#b4befe;border-color:#b4befe}
.btn-danger{background:#f38ba8;color:#1e1e2e;border-color:#f38ba8}
.btn-danger:hover{background:#eba0ac;border-color:#eba0ac}
.btn-success{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.btn-success:hover{background:#94e2d5;border-color:#94e2d5}
.btn-warning{background:#f9e2af;color:#1e1e2e;border-color:#f9e2af}
.btn-warning:hover{background:#fab387;border-color:#fab387}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{padding:3px 7px;font-size:11px}
.search-box{display:flex;align-items:center;background:#181825;border:1px solid #45475a;border-radius:5px;padding:0 8px;flex:1;max-width:300px;position:relative}
.search-box input{background:transparent;border:none;color:#cdd6f4;font-size:12px;padding:5px 4px;outline:none;width:100%;font-family:inherit}
.search-box input::placeholder{color:#6c7086}
.search-icon{color:#6c7086;font-size:13px;flex-shrink:0;margin-right:4px}
.search-badge{background:#89b4fa;color:#1e1e2e;border-radius:10px;font-size:10px;padding:1px 5px;font-weight:600;min-width:18px;text-align:center;flex-shrink:0}
.search-results{position:absolute;top:100%;left:0;right:0;background:#313244;border:1px solid #45475a;border-radius:6px;max-height:260px;overflow-y:auto;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.4);margin-top:3px;display:none}
.search-results.show{display:block}
.search-result-item{padding:6px 10px;cursor:pointer;font-size:11px;border-bottom:1px solid #45475a;display:flex;justify-content:space-between;align-items:center;gap:8px}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:#45475a}
.search-result-path{color:#89b4fa;font-family:"JetBrains Mono",monospace;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.search-result-preview{color:#a6e3a1;font-family:"JetBrains Mono",monospace;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%}
.path-display{font-size:11px;color:#7f849c;margin-left:auto;font-family:"JetBrains Mono",monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

.side-panels{position:fixed;top:0;right:0;height:100%;width:0;z-index:500;display:flex;pointer-events:none}
.side-panel{position:relative;background:#181825;border-left:1px solid #45475a;height:100%;overflow:hidden;transition:width .25s;width:0;display:flex;flex-direction:column;pointer-events:auto}
.side-panel.open{width:320px}
.panel-header{padding:10px 14px;background:#313244;border-bottom:1px solid #45475a;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#89b4fa;flex-shrink:0}
.panel-close{margin-left:auto;background:transparent;border:none;color:#7f849c;cursor:pointer;font-size:16px;padding:0 4px}
.panel-close:hover{color:#cdd6f4}
.panel-body{flex:1;overflow:auto;padding:10px 12px}

.history-item{padding:7px 10px;border-radius:5px;margin-bottom:5px;font-size:12px;cursor:pointer;border-left:3px solid #45475a;background:#1e1e2e;display:flex;align-items:center;gap:8px}
.history-item:hover{background:#313244}
.history-item.active{border-left-color:#89b4fa;background:rgba(137,180,250,.1)}
.history-item .h-icon{font-size:14px;flex-shrink:0;width:18px;text-align:center}
.history-item .h-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .h-time{font-size:10px;color:#6c7086;flex-shrink:0}
.history-empty{color:#6c7086;text-align:center;padding:24px 12px;font-size:12px}

.schema-issue{padding:7px 10px;border-radius:5px;margin-bottom:5px;font-size:11px;cursor:pointer;border-left:3px solid #f38ba8;background:rgba(243,139,168,.08)}
.schema-issue.warning{border-left-color:#f9e2af;background:rgba(249,226,175,.08)}
.schema-issue:hover{background:#313244}
.schema-issue .si-msg{color:#cdd6f4;line-height:1.4}
.schema-issue .si-path{color:#89b4fa;font-family:"JetBrains Mono",monospace;font-size:10px;margin-top:3px}
.schema-empty{color:#a6e3a1;text-align:center;padding:24px 12px;font-size:12px}
.schema-syntax-error{color:#f38ba8;padding:10px;font-size:11px;line-height:1.5;background:rgba(243,139,168,.1);border-radius:5px}

.diff-panel-item{padding:6px 10px;border-radius:4px;margin-bottom:4px;font-size:11px;cursor:pointer;border-left:3px solid #a6e3a1;background:rgba(166,227,161,.08)}
.diff-panel-item.modified{border-left-color:#f9e2af;background:rgba(249,226,175,.08)}
.diff-panel-item.removed{border-left-color:#f38ba8;background:rgba(243,139,168,.08)}
.diff-panel-item:hover{background:#313244}
.diff-panel-item .dp-type{font-weight:700;font-size:10px;margin-right:6px}
.diff-panel-item.added .dp-type{color:#a6e3a1}
.diff-panel-item.modified .dp-type{color:#f9e2af}
.diff-panel-item.removed .dp-type{color:#f38ba8}
.diff-panel-item .dp-path{color:#89b4fa;font-family:"JetBrains Mono",monospace;font-size:10px;margin-top:2px}

.diff-filters{display:flex;gap:4px;flex-wrap:wrap;align-items:center;padding:0 0 8px;border-bottom:1px solid #45475a;margin-bottom:8px}
.diff-filter-btn{padding:2px 7px;border-radius:4px;font-size:10px;cursor:pointer;border:1px solid #45475a;background:transparent;color:#cdd6f4;transition:all .15s;white-space:nowrap}
.diff-filter-btn.active{background:#45475a;border-color:#7f849c}
.diff-filter-btn.f-added{border-color:#a6e3a1;color:#a6e3a1}
.diff-filter-btn.f-added.active{background:rgba(166,227,161,.2)}
.diff-filter-btn.f-modified{border-color:#f9e2af;color:#f9e2af}
.diff-filter-btn.f-modified.active{background:rgba(249,226,175,.2)}
.diff-filter-btn.f-removed{border-color:#f38ba8;color:#f38ba8}
.diff-filter-btn.f-removed.active{background:rgba(243,139,168,.2)}
.diff-filter-input{background:#1e1e2e;border:1px solid #45475a;color:#cdd6f4;font-size:11px;padding:2px 6px;border-radius:4px;outline:none;width:100%;margin-top:6px}
.diff-filter-input:focus{border-color:#89b4fa}
.diff-batch{display:flex;gap:4px;flex-wrap:wrap;padding:6px 0;border-bottom:1px solid #45475a;margin-bottom:8px}
.diff-batch .btn{font-size:10px;padding:2px 6px}
.diff-active-highlight{background:rgba(137,180,250,.25) !important;outline:2px solid #89b4fa;border-radius:4px}

.schema-group{margin-bottom:8px}
.schema-group-header{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;background:#1e1e2e;border-left:3px solid #45475a;margin-bottom:4px}
.schema-group-header:hover{background:#313244}
.schema-group-header.g-type{border-left-color:#f38ba8;color:#f38ba8}
.schema-group-header.g-required{border-left-color:#fab387;color:#fab387}
.schema-group-header.g-additional{border-left-color:#f9e2af;color:#f9e2af}
.schema-group-header.g-enum{border-left-color:#cba6f7;color:#cba6f7}
.schema-group-header.g-constraint{border-left-color:#89dceb;color:#89dceb}
.schema-group-header.g-other{border-left-color:#7f849c;color:#7f849c}
.schema-group-count{font-size:10px;color:#6c7086;font-weight:400;margin-left:auto}
.schema-group-body{padding-left:4px}
.schema-group-body.collapsed{display:none}

main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#tree-container{flex:1;overflow:auto;padding:12px 16px;min-height:0}
.json-tree{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:13px;line-height:1.6;user-select:none}
.json-tree ul{list-style:none;padding-left:20px;border-left:1px dashed #45475a;margin-left:8px}
.json-tree>ul{padding-left:0;border-left:none;margin-left:0}
.tree-node{position:relative;padding:1px 4px;border-radius:4px;transition:background .15s}
.tree-node:hover{background:rgba(137,180,250,.07)}
.tree-node.drag-over-top::before,.tree-node.drag-over-bottom::after{content:'';position:absolute;left:0;right:0;height:2px;background:#89b4fa;border-radius:2px}
.tree-node.drag-over-top::before{top:0}
.tree-node.drag-over-bottom::after{bottom:0}
.tree-node.dragging{opacity:.4}
.tree-node.search-highlight{background:rgba(249,226,175,.13);outline:1px solid rgba(249,226,175,.25);border-radius:4px}
.tree-node.search-highlight-current{background:rgba(249,226,175,.28);outline:2px solid #f9e2af}
.tree-node.diff-added{background:rgba(166,227,161,.12)}
.tree-node.diff-modified{background:rgba(249,226,175,.12)}
.tree-node.diff-removed{background:rgba(243,139,168,.12);opacity:.75}
.tree-node.diff-removed .key,.tree-node.diff-removed .value{text-decoration:line-through}
.diff-marker{width:4px;position:absolute;left:-6px;top:2px;bottom:2px;border-radius:2px}
.diff-marker.added{background:#a6e3a1}
.diff-marker.modified{background:#f9e2af}
.diff-marker.removed{background:#f38ba8}

.node-row{display:inline-flex;align-items:center;gap:5px;min-height:24px;width:100%;position:relative}
.toggle{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;cursor:pointer;border-radius:3px;transition:all .15s;flex-shrink:0;color:#7f849c}
.toggle:hover{background:#45475a;color:#cdd6f4}
.toggle.empty{visibility:hidden;cursor:default}
.toggle svg{width:9px;height:9px;transition:transform .15s}
.toggle.expanded svg{transform:rotate(90deg)}
.key{color:#f9e2af;font-weight:500;cursor:default;position:relative}
.key.array-index{color:#7f849c;font-weight:400;cursor:default}
.key.array-index::after{content:':';color:#6c7086;margin-right:4px;margin-left:1px}
.key::after{content:':';color:#6c7086;margin-right:4px;margin-left:1px}
.key,.value{padding:1px 4px;border-radius:3px}
.value{cursor:pointer;position:relative}
.value:hover{background:rgba(137,180,250,.15)}
.value.string{color:#a6e3a1}
.value.number{color:#fab387}
.value.boolean{color:#cba6f7;font-weight:600}
.value.null{color:#f38ba8;font-style:italic;font-weight:600}
.value.object,.value.array{color:#89dceb}
.bracket{color:#89dceb}
.schema-badge{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;font-size:9px;font-weight:700;margin-left:3px;flex-shrink:0;cursor:help;position:relative}
.schema-badge.error{background:#f38ba8;color:#1e1e2e}
.schema-badge.warning{background:#f9e2af;color:#1e1e2e}

.editable-input{background:#313244;border:1px solid #89b4fa;color:inherit;font:inherit;padding:2px 6px;border-radius:4px;outline:none;min-width:90px}
.editable-input:focus{box-shadow:0 0 0 2px rgba(137,180,250,.25)}
.editable-input.invalid{border-color:#f38ba8;background:rgba(243,139,168,.12);box-shadow:0 0 0 2px rgba(243,139,168,.2)}
.type-selector{background:#313244;border:1px solid #45475a;color:#cdd6f4;font:inherit;padding:2px 4px;border-radius:4px;margin-right:3px;cursor:pointer;font-size:11px}
.key-input{background:#313244;border:1px solid #89b4fa;color:#f9e2af;font:inherit;padding:2px 6px;border-radius:4px;outline:none;width:130px}
.key-input:focus{box-shadow:0 0 0 2px rgba(137,180,250,.25)}

.edit-tooltip{position:absolute;bottom:100%;left:0;background:#f38ba8;color:#1e1e2e;padding:5px 9px;border-radius:5px;font-size:11px;font-weight:500;z-index:100;white-space:nowrap;pointer-events:none;box-shadow:0 4px 12px rgba(243,139,168,.3);margin-bottom:4px}
.edit-tooltip::after{content:'';position:absolute;top:100%;left:14px;border:4px solid transparent;border-top-color:#f38ba8}
.edit-tooltip .tt-path{font-family:"JetBrains Mono",monospace;font-size:10px;opacity:.8;display:block;margin-top:2px}

.context-menu{position:fixed;background:#313244;border:1px solid #45475a;border-radius:7px;padding:5px;min-width:200px;z-index:10000;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.context-menu-item{padding:6px 11px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;transition:background .1s}
.context-menu-item:hover{background:#45475a}
.context-menu-item.danger{color:#f38ba8}
.context-menu-item.danger:hover{background:rgba(243,139,168,.13)}
.context-menu-separator{height:1px;background:#45475a;margin:3px 5px}
.context-menu-icon{width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}

.error-banner{position:fixed;top:56px;right:14px;background:#f38ba8;color:#1e1e2e;padding:7px 12px;border-radius:6px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(243,139,168,.35);animation:slideIn .3s;max-width:360px;word-break:break-all}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.error-path{font-family:"JetBrains Mono",monospace;background:rgba(30,30,46,.2);padding:1px 5px;border-radius:3px;margin-top:3px;display:inline-block;font-size:10px}
.banner-success{background:#a6e3a1;color:#1e1e2e}

.schema-panel{background:#181825;border-bottom:1px solid #45475a;flex-shrink:0;overflow:hidden;transition:max-height .3s;max-height:0}
.schema-panel.open{max-height:240px}
.schema-panel-inner{padding:8px 14px;display:flex;flex-direction:column;gap:6px}
.schema-panel-inner textarea{background:#11111b;color:#cdd6f4;border:1px solid #45475a;border-radius:5px;padding:6px 10px;font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.5;resize:vertical;min-height:70px;max-height:140px;outline:none}
.schema-panel-inner textarea:focus{border-color:#89b4fa}
.schema-panel-bar{display:flex;align-items:center;gap:7px}
.schema-status{font-size:11px;flex:1}
.schema-status.ok{color:#a6e3a1}
.schema-status.err{color:#f38ba8}
.schema-toggle{font-size:11px;color:#7f849c;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.schema-toggle:hover{color:#cdd6f4}

footer{background:#313244;border-top:1px solid #45475a;display:flex;flex-direction:column;flex-shrink:0;max-height:40%;min-height:90px}
.footer-header{padding:5px 12px;background:#1e1e2e;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#7f849c;border-bottom:1px solid #45475a;gap:8px;flex-wrap:wrap}
.footer-header span{font-weight:600;white-space:nowrap}
.footer-badges{display:flex;align-items:center;gap:5px}
.footer-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;cursor:pointer;padding:2px 7px;border-radius:4px;background:rgba(243,139,168,.15);color:#f38ba8;white-space:nowrap;font-weight:600}
.footer-badge:hover{background:rgba(243,139,168,.22)}
.footer-badge.clean{background:rgba(166,227,161,.15);color:#a6e3a1;cursor:default}
.footer-badge.diff{background:rgba(249,226,175,.15);color:#f9e2af}
.footer-badge.diff:hover{background:rgba(249,226,175,.22)}
.footer-badge.history{background:rgba(137,180,250,.15);color:#89b4fa}
.footer-badge.history:hover{background:rgba(137,180,250,.22)}
#raw-json{flex:1;background:#181825;color:#cdd6f4;border:none;padding:10px 14px;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:12px;line-height:1.5;resize:none;outline:none;overflow:auto;white-space:pre}
#raw-json:focus{background:#11111b}
.resizer{height:3px;cursor:ns-resize;background:transparent;transition:background .2s;flex-shrink:0}
.resizer:hover,.resizer.active{background:#89b4fa}

input[type=file]{display:none}
</style>
</head>
<body>

<header>
  <div class="toolbar-row">
    <h1>JSON 配置工作台</h1>
    <button class="btn" id="btn-open" title="打开 JSON 文件 (Ctrl+O)">📂 打开</button>
    <button class="btn btn-primary" id="btn-save" title="保存 JSON (Ctrl+S)">💾 保存</button>
    <button class="btn btn-success" id="btn-save-workspace" title="保存工作区">💼 保存工作区</button>
    <button class="btn" id="btn-open-workspace" title="加载工作区">📁 加载工作区</button>
    <div style="width:1px;height:20px;background:#45475a;margin:0 4px"></div>
    <button class="btn btn-sm" id="btn-undo" title="撤销 (Ctrl+Z)" disabled>↶ 撤销</button>
    <button class="btn btn-sm" id="btn-redo" title="重做 (Ctrl+Y)" disabled>↷ 重做</button>
    <button class="btn btn-sm" id="btn-history" title="操作历史">📜 历史</button>
    <div style="width:1px;height:20px;background:#45475a;margin:0 4px"></div>
    <button class="btn btn-sm" id="btn-diff" title="与上次保存对比">🔍 对比</button>
    <button class="btn btn-sm" id="btn-issues" title="Schema 问题列表">⚠ 问题</button>
    <span class="schema-toggle" id="schema-toggle">▶ Schema</span>
    <span class="path-display" id="current-path">$</span>
  </div>
  <div class="toolbar-row">
    <button class="btn btn-sm" id="btn-expand-all">展开全部</button>
    <button class="btn btn-sm" id="btn-collapse-all">折叠全部</button>
    <button class="btn btn-sm" id="btn-format">格式化</button>
    <button class="btn btn-sm btn-danger" id="btn-clear">清空</button>
    <button class="btn btn-sm" id="btn-sample">示例</button>
    <div class="search-box" id="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜索键名、值或路径… (Ctrl+F)" spellcheck="false">
      <span class="search-badge" id="search-badge" style="display:none">0</span>
      <div class="search-results" id="search-results"></div>
    </div>
    <button class="btn btn-sm" id="search-prev" title="上一个 (Shift+Enter)">↑</button>
    <button class="btn btn-sm" id="search-next" title="下一个 (Enter)">↓</button>
    <button class="btn btn-sm" id="search-clear">✕</button>
  </div>
</header>

<div class="schema-panel" id="schema-panel">
  <div class="schema-panel-inner">
    <div class="schema-panel-bar">
      <span style="font-size:11px;color:#7f849c">JSON Schema：</span>
      <button class="btn btn-sm btn-primary" id="btn-validate">校验</button>
      <button class="btn btn-sm" id="btn-clear-schema">清空</button>
      <span class="schema-status" id="schema-status"></span>
    </div>
    <textarea id="schema-input" spellcheck="false" placeholder='{"type":"object","required":["name"],"properties":{"name":{"type":"string"}}}'></textarea>
  </div>
</div>

<main>
  <div id="tree-container">
    <div class="json-tree" id="json-tree"></div>
  </div>
  <div class="resizer" id="resizer"></div>
  <footer>
    <div class="footer-header">
      <span>📝 原始 JSON（可编辑同步到上方树）</span>
      <div class="footer-badges">
        <span class="footer-badge history" id="badge-history" style="display:none">📜 0</span>
        <span class="footer-badge diff" id="badge-diff" style="display:none">🔍 0 变更</span>
        <span class="footer-badge" id="badge-issues" style="display:none">⚠ 0 问题</span>
      </div>
      <span id="json-stats">-</span>
    </div>
    <textarea id="raw-json" spellcheck="false" placeholder='在此粘贴 JSON...'></textarea>
  </footer>
</main>

<div class="side-panels">
  <div class="side-panel" id="history-panel">
    <div class="panel-header">📜 操作历史<button class="panel-close" data-panel="history-panel">✕</button></div>
    <div class="panel-body" id="history-body"><div class="history-empty">暂无操作记录</div></div>
  </div>
  <div class="side-panel" id="issues-panel">
    <div class="panel-header">⚠ Schema 问题<button class="panel-close" data-panel="issues-panel">✕</button></div>
    <div class="panel-body" id="issues-body"></div>
  </div>
  <div class="side-panel" id="diff-panel">
    <div class="panel-header">🔍 差异对比<button class="panel-close" data-panel="diff-panel">✕</button></div>
    <div class="panel-body" id="diff-body"></div>
  </div>
</div>

};

function escapeKeyForPath(k) { return '["' + JSON.stringify(k).slice(1,-1) + '"]'; }
function buildPath(parent, key) {
  if (typeof key === 'number') return parent + '[' + key + ']';
  return parent + escapeKeyForPath(key);
}
function parsePath(path) {
  if (path === 'root') return [];
  var result = [], i = 4;
  while (i < path.length) {
    if (path[i] === '[') {
      i++;
      if (i < path.length && path[i] === '"') {
        i++; var key = '';
        while (i < path.length) {
          if (path[i] === '\\') { key += path[i] + path[i+1]; i += 2; }
          else if (path[i] === '"') { i++; break; }
          else { key += path[i]; i++; }
        }
        result.push(JSON.parse('"' + key + '"'));
        if (i < path.length && path[i] === ']') i++;
      } else {
        var num = '';
        while (i < path.length && path[i] !== ']') { num += path[i]; i++; }
        result.push(Number(num));
        if (i < path.length) i++;
      }
    } else i++;
  }
  return result;
}
function buildPathFromParts(parts) {
  var p = 'root';
  for (var i = 0; i < parts.length; i++) p = buildPath(p, parts[i]);
  return p;
}
function getParentPath(path) {
  if (path === 'root') return null;
  var parts = parsePath(path); parts.pop();
  if (parts.length === 0) return 'root';
  return buildPathFromParts(parts);
}
function getKeyAtPath(path) {
  if (path === 'root') return null;
  var parts = parsePath(path);
  return parts[parts.length - 1];
}
function pathToDisplay(path) {
  if (path === 'root') return '$';
  var parts = parsePath(path), s = '$';
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i];
    if (typeof p === 'number') s += '[' + p + ']';
    else if (/^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(p)) s += '.' + p;
    else s += '[' + JSON.stringify(p) + ']';
  }
  return s;
}
function getValueAtPath(path) {
  if (path === 'root') return state.data;
  var parts = parsePath(path), cur = state.data;
  for (var i = 0; i < parts.length; i++) cur = cur[parts[i]];
  return cur;
}
function getOldValueAtPath(path) {
  if (!state.savedSnapshot) return undefined;
  if (path === 'root') return state.savedSnapshot;
  var parts = parsePath(path), cur = state.savedSnapshot;
  for (var i = 0; i < parts.length; i++) {
    if (cur === undefined || cur === null) return undefined;
    cur = cur[parts[i]];
  }
  return cur;
}
function getRemovedChildren(parentPath, parentValue) {
  var result = [];
  if (!state.savedSnapshot) return result;
  var oldVal = getOldValueAtPath(parentPath);
  if (oldVal === undefined || oldVal === null || typeof oldVal !== 'object') return result;
  state.diffMap.forEach(function(type, path) {
    if (type !== 'removed') return;
    var pp = getParentPath(path);
    if (pp !== parentPath) return;
    var key = getKeyAtPath(path);
    if (typeof key === 'number') {
      if (Array.isArray(oldVal) && key < oldVal.length) result.push({key: key, value: oldVal[key]});
    } else {
      if (!Array.isArray(oldVal) && oldVal.hasOwnProperty(key)) result.push({key: key, value: oldVal[key]});
    }
  });
  result.sort(function(a, b) {
    if (typeof a.key === 'number' && typeof b.key === 'number') return a.key - b.key;
    return String(a.key).localeCompare(String(b.key));
  });
  return result;
}
function setValueAtPath(path, value) {
  if (path === 'root') { state.data = value; return; }
  var parts = parsePath(path), last = parts.pop(), cur = state.data;
  for (var i = 0; i < parts.length; i++) cur = cur[parts[i]];
  cur[last] = value;
}
function deleteAtPath(path) {
  if (path === 'root') return;
  var parts = parsePath(path), last = parts.pop(), cur = state.data;
  for (var i = 0; i < parts.length; i++) cur = cur[parts[i]];
  if (Array.isArray(cur)) cur.splice(Number(last), 1);
  else delete cur[last];
}
function getType(v) {
  if (v === null) return 'null';
  if (Array.isArray(v)) return 'array';
  return typeof v;
}
function parseValue(str, targetType) {
  str = str.trim();
  if (targetType === 'string') return str;
  if (targetType === 'number') {
    if (str === '' || isNaN(Number(str))) throw new Error('无效的数字');
    return Number(str);
  }
  if (targetType === 'boolean') {
    if (str === 'true') return true;
    if (str === 'false') return false;
    throw new Error('布尔值必须为 true 或 false');
  }
  if (targetType === 'null') {
    if (str === 'null' || str === '') return null;
    throw new Error('null 值必须为 null');
  }
  if (targetType === 'array') {
    try { var v = JSON.parse(str); if (!Array.isArray(v)) throw 0; return v; }
    catch(e) { throw new Error('无效的 JSON 数组'); }
  }
  if (targetType === 'object') {
    try { var v2 = JSON.parse(str); if (typeof v2 !== 'object' || Array.isArray(v2) || v2 === null) throw 0; return v2; }
    catch(e2) { throw new Error('无效的 JSON 对象'); }
  }
  return str;
}
function expandAllChildren(path, value) {
  if (value && typeof value === 'object') {
    state.expanded.add(path);
    if (Array.isArray(value)) value.forEach(function(v,i){expandAllChildren(buildPath(path,i),v)});
    else Object.keys(value).forEach(function(k){expandAllChildren(buildPath(path,k),value[k])});
  }
}
function expandToPath(path) {
  var parts = parsePath(path), p = 'root';
  state.expanded.add(p);
  for (var i = 0; i < parts.length - 1; i++) {
    p = buildPath(p, parts[i]);
    state.expanded.add(p);
  }
}
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function snapshot() {
  return {
    data: deepClone(state.data),
    expanded: Array.from(state.expanded),
    schema: state.schema ? deepClone(state.schema) : null,
    schemaSyntaxError: state.schemaSyntaxError || null,
    schemaText: schemaInputEl.value,
    search: searchInputEl.value,
    savedSnapshot: state.savedSnapshot ? deepClone(state.savedSnapshot) : null
  };
}
function restoreSnapshot(snap) {
  state.data = deepClone(snap.data);
  state.expanded = new Set(snap.expanded || ['root']);
  state.schema = snap.schema ? deepClone(snap.schema) : null;
  state.schemaSyntaxError = snap.schemaSyntaxError || null;
  schemaInputEl.value = snap.schemaText || '';
  if (snap.search !== undefined) searchInputEl.value = snap.search;
  state.savedSnapshot = snap.savedSnapshot ? deepClone(snap.savedSnapshot) : null;
  if (state.schema && !state.schemaSyntaxError) runSchemaValidation(false);
  else { state.schemaErrors.clear(); }
  state.searchMatches = [];
  state.searchCurrentIdx = -1;
}
function pushHistory(label) {
  if (suppressHistory) return;
  var snap = snapshot();
  if (history.index >= 0 && history.stack.length > history.index) {
    history.stack = history.stack.slice(0, history.index + 1);
  }
  history.stack.push({
    label: label || '编辑',
    time: new Date(),
    snapshot: snap
  });
  if (history.stack.length > history.maxSize) history.stack.shift();
  history.index = history.stack.length - 1;
  updateHistoryUI();
  updateUndoRedoButtons();
}
function undo() {
  if (history.index <= 0) return;
  history.index--;
  restoreSnapshot(history.stack[history.index].snapshot);
  render(); syncRawJson(); applySearchIfNeeded();
  updateHistoryUI(); updateUndoRedoButtons(); computeDiff();
}
function redo() {
  if (history.index >= history.stack.length - 1) return;
  history.index++;
  restoreSnapshot(history.stack[history.index].snapshot);
  render(); syncRawJson(); applySearchIfNeeded();
  updateHistoryUI(); updateUndoRedoButtons(); computeDiff();
}
function updateUndoRedoButtons() {
  document.getElementById('btn-undo').disabled = history.index <= 0;
  document.getElementById('btn-redo').disabled = history.index >= history.stack.length - 1;
}
function updateHistoryUI() {
  badgeHistory.style.display = history.stack.length > 0 ? 'inline-flex' : 'none';
  badgeHistory.textContent = '📜 ' + history.stack.length;
  if (history.stack.length === 0) {
    historyBodyEl.innerHTML = '<div class="history-empty">暂无操作记录</div>';
    return;
  }
  var html = '';
  for (var i = history.stack.length - 1; i >= 0; i--) {
    var item = history.stack[i];
    var isCur = i === history.index;
    var time = item.time.toLocaleTimeString('zh-CN', {hour12: false});
    html += '<div class="history-item' + (isCur ? ' active' : '') + '" data-idx="' + i + '">' +
      '<span class="h-icon">' + (isCur ? '●' : '○') + '</span>' +
      '<span class="h-text">' + escapeHtml(item.label) + '</span>' +
      '<span class="h-time">' + time + '</span></div>';
  }
  historyBodyEl.innerHTML = html;
  historyBodyEl.querySelectorAll('.history-item').forEach(function(el) {
    el.addEventListener('click', function() {
      var idx = parseInt(el.dataset.idx);
      history.index = idx;
      restoreSnapshot(history.stack[idx].snapshot);
      render(); syncRawJson(); applySearchIfNeeded();
      updateHistoryUI(); updateUndoRedoButtons(); computeDiff();
      closeAllPanels();
    });
  });
}
function applySearchIfNeeded() {
  var q = searchInputEl.value.trim();
  if (q) performSearch(q);
  else { state.searchMatches = []; state.searchCurrentIdx = -1; }
}

function setData(data, label, resetHistory) {
  if (resetHistory) {
    history.stack = [];
    history.index = -1;
    state.savedSnapshot = null;
    state.schemaErrors.clear();
    state.schemaSyntaxError = null;
    state.searchMatches = [];
    state.searchCurrentIdx = -1;
  }
  state.data = data;
  state.expanded = new Set(['root']);
  expandAllChildren('root', state.data);
  render(); syncRawJson();
  if (state.schema && !state.schemaSyntaxError) runSchemaValidation(false);
  else state.schemaErrors.clear();
  computeDiff();
  pushHistory(label || '加载数据');
  if (resetHistory) { updateHistoryUI(); updateUndoRedoButtons(); }
}

function render() {
  treeEl.innerHTML = '';
  renderNode(state.data, 'root', null, treeEl, true);
  updateStats();
  applySearchHighlights();
  applyDiffHighlights();
  updateIssuesList();
}

function renderNode(value, path, key, parent, isRoot, isRemoved) {
  var type = getType(value);
  var li = document.createElement('li');
  var nodeDiv = document.createElement('div');
  nodeDiv.className = 'tree-node';
  nodeDiv.dataset.path = path;
  nodeDiv.dataset.type = type;
  if (key !== null) nodeDiv.dataset.key = String(key);

  var diff = isRemoved ? 'removed' : state.diffMap.get(path);
  if (diff) {
    nodeDiv.classList.add('diff-' + diff);
    var marker = document.createElement('div');
    marker.className = 'diff-marker ' + diff;
    nodeDiv.appendChild(marker);
  }

  var row = document.createElement('div');
  row.className = 'node-row';

  var toggle = document.createElement('span');
  toggle.className = 'toggle';
  var hasChildren = type === 'object' || type === 'array';
  var childCount = hasChildren ? (Array.isArray(value) ? value.length : Object.keys(value).length) : 0;
  var removedChildren = !isRemoved && hasChildren ? getRemovedChildren(path, value) : [];
  var totalChildCount = childCount + removedChildren.length;
  if (!hasChildren || totalChildCount === 0) toggle.classList.add('empty');
  var expanded = state.expanded.has(path);
  if (expanded && hasChildren) toggle.classList.add('expanded');
  toggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  row.appendChild(toggle);

  if (key !== null && !isRoot) {
    var keyEl = document.createElement('span');
    var isArrayIdx = typeof key === 'number';
    keyEl.className = 'key' + (isArrayIdx ? ' array-index' : '');
    keyEl.textContent = String(key);
    keyEl.dataset.path = path;
    if (!isArrayIdx && !isRemoved) {
      (function(k, p, nd) {
        keyEl.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          startEditKey(nd, k, p);
        });
      })(key, path, nodeDiv);
    }
    row.appendChild(keyEl);
  }

  if (hasChildren) {
    var bo = document.createElement('span');
    bo.className = 'bracket';
    bo.textContent = type === 'array' ? '[' : '{';
    row.appendChild(bo);
    if (!expanded && childCount > 0) {
      var ci = document.createElement('span');
      ci.style.cssText = 'color:#6c7086;font-size:10px;margin:0 2px';
      ci.textContent = childCount + ' 项';
      row.appendChild(ci);
    }
    var bc = document.createElement('span');
    bc.className = 'bracket';
    bc.textContent = type === 'array' ? ']' : '}';
    row.appendChild(bc);
  } else {
    var valueEl = document.createElement('span');
    valueEl.className = 'value ' + type;
    valueEl.textContent = type === 'string' ? JSON.stringify(value) : String(value);
    valueEl.dataset.path = path;
    if (!isRemoved) {
      (function(v, t, p) {
        valueEl.addEventListener('dblclick', function(e) {
          e.stopPropagation();
          startEditValue(valueEl, v, t, p);
        });
      })(value, type, path);
    }
    row.appendChild(valueEl);
  }

  if (!isRemoved) {
    var schemaErrs = state.schemaErrors.get(path);
    if (schemaErrs && schemaErrs.length > 0) {
      var badge = document.createElement('span');
      var hasError = schemaErrs.some(function(e){return e.severity==='error'});
      badge.className = 'schema-badge ' + (hasError ? 'error' : 'warning');
      badge.textContent = '!';
      badge.title = schemaErrs.map(function(e){return e.message}).join('\n');
      row.appendChild(badge);
    }
  }

  nodeDiv.appendChild(row);
  li.appendChild(nodeDiv);

  if (hasChildren && expanded && totalChildCount > 0) {
    var ul = document.createElement('ul');
    var entries;
    if (Array.isArray(value)) entries = value.map(function(v,i){return [i,v]});
    else entries = Object.keys(value).map(function(k){return [k, value[k]]});
    for (var ei = 0; ei < entries.length; ei++) {
      renderNode(entries[ei][1], buildPath(path, entries[ei][0]), entries[ei][0], ul, false, false);
    }
    if (!isRemoved && removedChildren.length > 0) {
      for (var ri = 0; ri < removedChildren.length; ri++) {
        var rc = removedChildren[ri];
        renderNode(rc.value, buildPath(path, rc.key), rc.key, ul, false, true);
      }
    }
    li.appendChild(ul);
  }
  parent.appendChild(li);

  if (hasChildren) {
    (function(p, cc) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        if (cc === 0) return;
        if (state.expanded.has(p)) state.expanded.delete(p);
        else state.expanded.add(p);
        render();
      });
    })(path, totalChildCount);
  }

  if (!isRemoved) {
    setupDragAndDrop(nodeDiv, path, type, isRoot);
    nodeDiv.addEventListener('contextmenu', function(e) {
      e.preventDefault(); e.stopPropagation();
      showContextMenu(e.clientX, e.clientY, path, type, isRoot, typeof key === 'number');
    });
  } else {
    nodeDiv.addEventListener('contextmenu', function(e) { e.preventDefault(); e.stopPropagation(); });
    nodeDiv.addEventListener('dblclick', function(e) { e.preventDefault(); e.stopPropagation(); });
  }
  return li;
}

function startEditValue(el, value, type, path) {
  var container = document.createElement('span');
  container.style.cssText = 'display:inline-flex;align-items:center;position:relative';
  var typeSel = document.createElement('select');
  typeSel.className = 'type-selector';
  ['string','number','boolean','null','object','array'].forEach(function(t) {
    var opt = document.createElement('option'); opt.value = t; opt.textContent = t;
    if (t === type) opt.selected = true;
    typeSel.appendChild(opt);
  });
  container.appendChild(typeSel);
  var input = document.createElement('input');
  input.className = 'editable-input';
  if (type === 'string') input.value = value;
  else if (type === 'object' || type === 'array') input.value = JSON.stringify(value);
  else input.value = String(value);
  if (type === 'null') { input.value = 'null'; input.readOnly = true; }
  container.appendChild(input);
  var tooltip = document.createElement('div');
  tooltip.className = 'edit-tooltip'; tooltip.style.display = 'none';
  container.appendChild(tooltip);
  el.replaceWith(container);
  input.focus(); input.select();

  var prevSnapshot = snapshot();

  function showErr(msg) {
    tooltip.textContent = ''; tooltip.style.display = 'block';
    var ms = document.createElement('span'); ms.textContent = '⚠ ' + msg; tooltip.appendChild(ms);
    var ps = document.createElement('span'); ps.className = 'tt-path';
    ps.textContent = pathToDisplay(path); tooltip.appendChild(ps);
    input.classList.add('invalid');
  }
  function hideErr() { tooltip.style.display = 'none'; input.classList.remove('invalid'); }
  function commit() {
    var nt = typeSel.value;
    try {
      var nv = parseValue(input.value, nt);
      var oldVal = getValueAtPath(path);
      if (JSON.stringify(oldVal) === JSON.stringify(nv) && getType(oldVal) === nt) { render(); return; }
      suppressHistory = true;
      setValueAtPath(path, nv);
      if (nt === 'object' || nt === 'array') expandAllChildren(path, nv);
      suppressHistory = false;
      pushHistory('编辑值 ' + pathToDisplay(path));
      hideErr(); render(); syncRawJson();
      if (state.schema) runSchemaValidation(false);
      computeDiff();
    } catch(err) { showErr(err.message); }
  }
  function cancel() { render(); }

  input.addEventListener('input', function() {
    try { parseValue(input.value, typeSel.value); hideErr(); }
    catch(err) { showErr(err.message); }
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  typeSel.addEventListener('change', function() {
    var t = typeSel.value;
    input.readOnly = t === 'null';
    if (t === 'null') { input.value = 'null'; hideErr(); }
    else if (t === 'boolean' && input.value !== 'true' && input.value !== 'false') input.value = 'true';
    else if (t === 'number' && input.value === '') input.value = '0';
    input.dispatchEvent(new Event('input'));
  });
  var ch = function(e) { if (!container.contains(e.target)) { cancel(); document.removeEventListener('click', ch); } };
  setTimeout(function(){document.addEventListener('click', ch);}, 0);
  container.addEventListener('click', function(e){e.stopPropagation()});
}

function startEditKey(nodeDiv, oldKey, path) {
  var parentPath = getParentPath(path);
  var parentValue = getValueAtPath(parentPath);
  if (Array.isArray(parentValue)) return;
  var row = nodeDiv.querySelector('.node-row');
  var keyEl = row.querySelector('.key');
  if (!keyEl) return;
  var input = document.createElement('input');
  input.className = 'key-input'; input.value = String(oldKey);
  keyEl.replaceWith(input); input.focus(); input.select();

  function commit() {
    var nk = input.value;
    if (!nk) { render(); return; }
    if (nk === String(oldKey)) { render(); return; }
    if (Object.prototype.hasOwnProperty.call(parentValue, nk)) {
      showErrorBanner('键名已存在: ' + nk, path); return;
    }
    var entries = Object.entries(parentValue);
    for (var i = 0; i < entries.length; i++) if (entries[i][0] === String(oldKey)) { entries[i] = [nk, entries[i][1]]; break; }
    var newObj = {};
    for (var j = 0; j < entries.length; j++) newObj[entries[j][0]] = entries[j][1];
    suppressHistory = true;
    setValueAtPath(parentPath, newObj);
    suppressHistory = false;
    pushHistory('重命名键 ' + pathToDisplay(path));
    render(); syncRawJson();
    if (state.schema) runSchemaValidation(false);
    computeDiff();
  }
  function cancel() { render(); }
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
  });
  var ch = function(e) { if (e.target !== input) { cancel(); document.removeEventListener('click', ch); } };
  setTimeout(function(){document.addEventListener('click', ch);}, 0);
  input.addEventListener('click', function(e){e.stopPropagation()});
}

function setupDragAndDrop(nodeDiv, path, type, isRoot) {
  nodeDiv.draggable = !isRoot;
  nodeDiv.addEventListener('dragstart', function(e) {
    e.stopPropagation();
    if (isRoot) { e.preventDefault(); return; }
    var pp = getParentPath(path);
    if (!pp) { e.preventDefault(); return; }
    dragSrcPath = path; dragSrcParent = pp;
    nodeDiv.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', path);
  });
  nodeDiv.addEventListener('dragend', function() {
    nodeDiv.classList.remove('dragging');
    dragSrcPath = null; dragSrcParent = null;
    document.querySelectorAll('.tree-node').forEach(function(n){
      n.classList.remove('drag-over-top','drag-over-bottom');
    });
  });
  nodeDiv.addEventListener('dragover', function(e) {
    e.preventDefault(); e.stopPropagation();
    if (!dragSrcParent) return;
    var tgtParent = getParentPath(path);
    if (dragSrcParent !== tgtParent) return;
    if (path === dragSrcPath) return;
    if (path.startsWith(dragSrcPath + '[')) return;
    var rect = nodeDiv.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    nodeDiv.classList.remove('drag-over-top','drag-over-bottom');
    nodeDiv.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
  });
  nodeDiv.addEventListener('dragleave', function(e) {
    if (!nodeDiv.contains(e.relatedTarget)) nodeDiv.classList.remove('drag-over-top','drag-over-bottom');
  });
  nodeDiv.addEventListener('drop', function(e) {
    e.preventDefault(); e.stopPropagation();
    if (!dragSrcPath || dragSrcPath === path) return;
    var spp = dragSrcParent;
    var tpp = getParentPath(path);
    if (spp !== tpp) return;
    if (path.startsWith(dragSrcPath + '[')) return;
    var rect = nodeDiv.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    var insertBefore = e.clientY < mid;
    nodeDiv.classList.remove('drag-over-top','drag-over-bottom');
    var srcKey = getKeyAtPath(dragSrcPath);
    var tgtKey = getKeyAtPath(path);
    var parent = getValueAtPath(spp);
    var isArray = Array.isArray(parent);
    suppressHistory = true;
    if (isArray) {
      var si = Number(srcKey), ti = Number(tgtKey);
      var moved = parent[si]; parent.splice(si, 1);
      if (si < ti) ti--;
      var fi = insertBefore ? ti : ti + 1;
      parent.splice(fi, 0, moved);
    } else {
      var sk = String(srcKey), tk = String(tgtKey);
      var keys = Object.keys(parent);
      var si2 = -1; for (var i = 0; i < keys.length; i++) if (keys[i] === sk) { si2 = i; break; }
      keys.splice(si2, 1);
      var ti2 = -1; for (var j = 0; j < keys.length; j++) if (keys[j] === tk) { ti2 = j; break; }
      var fi2 = insertBefore ? ti2 : ti2 + 1;
      keys.splice(fi2, 0, sk);
      var newObj = {}; for (var k = 0; k < keys.length; k++) newObj[keys[k]] = parent[keys[k]];
      setValueAtPath(spp, newObj);
    }
    suppressHistory = false;
    pushHistory('拖拽排序 ' + (isArray ? '数组' : '对象'));
    render(); syncRawJson(); computeDiff();
  });
}

function showContextMenu(x, y, path, type, isRoot, isArrayIndex) {
  var items = [];
  var parentType = isRoot ? null : getType(getValueAtPath(getParentPath(path)));
  var parentIsArray = parentType === 'array';

  if (!isRoot) items.push({label:'➕ 添加同级' + (parentIsArray ? '元素' : '键值对'), icon:'＋', action:function(){addSibling(path)}});
  if (type === 'object') items.push({label:'➕ 添加子键值对', icon:'↳', action:function(){addChild(path,'object')}});
  if (type === 'array') items.push({label:'➕ 添加子元素', icon:'↳', action:function(){addChild(path,'array')}});
  items.push({separator:true});
  items.push({label:'📋 复制路径', icon:'⧉', action:function(){copyPath(path)}});
  items.push({label:'📋 复制 JSON 值', icon:'{ }', action:function(){copyJsonValue(path)}});
  if (!isRoot) {
    items.push({separator:true});
    items.push({label:'🗑 删除该' + (isArrayIndex ? '元素' : '节点'), icon:'✕', danger:true, action:function(){deleteNode(path)}});
  }
  contextMenuEl.innerHTML = '';
  items.forEach(function(item) {

    } else {

  });
}

function addSibling(path) {
  var parentPath = getParentPath(path);
  var parent = getValueAtPath(parentPath);
  var key = getKeyAtPath(path);
  suppressHistory = true;
  if (Array.isArray(parent)) {
    parent.splice(Number(key) + 1, 0, '新元素');
  } else {
    var nk = 'newKey', c = 1;
    while (nk in parent) nk = 'newKey' + (++c);
    var keys = Object.keys(parent);
    var ti = -1; for (var i = 0; i < keys.length; i++) if (keys[i] === String(key)) { ti = i; break; }
    var no = {};
    for (var j = 0; j <= ti; j++) no[keys[j]] = parent[keys[j]];
    no[nk] = '新值';
    for (var k = ti + 1; k < keys.length; k++) no[keys[k]] = parent[keys[k]];
    setValueAtPath(parentPath, no);
  }
  suppressHistory = false;
  pushHistory('添加同级' + (Array.isArray(parent) ? '元素' : '键'));
  state.expanded.add(parentPath);
  render(); syncRawJson();
  if (state.schema) runSchemaValidation(false);
  computeDiff();
}

function addChild(path, pt) {
  var parent = getValueAtPath(path);
  suppressHistory = true;
  state.expanded.add(path);
  if (pt === 'array') parent.push('新元素');
  else {
    var nk = 'newKey', c = 1;
    while (nk in parent) nk = 'newKey' + (++c);
    parent[nk] = '新值';
  }
  suppressHistory = false;
  pushHistory('添加子' + (pt === 'array' ? '元素' : '键值对'));
  render(); syncRawJson();
  if (state.schema) runSchemaValidation(false);
  computeDiff();
}

function validateSchema(data, schema, path) {
  var errors = [];
  if (!schema || typeof schema !== 'object') return errors;
  if (schema.type) {
    var at = getType(data);
    var tm = false;
    if (Array.isArray(schema.type)) {
      tm = schema.type.some(function(t){return at === t || (t === 'integer' && at === 'number' && data % 1 === 0)});
    } else {
      tm = at === schema.type || (schema.type === 'integer' && at === 'number' && data % 1 === 0);
    }
    if (!tm) errors.push({path:path, message:'类型应为 ' + schema.type + '，实际为 ' + at, severity:'error'});
  }
  if (schema.enum && schema.enum.indexOf(data) === -1) errors.push({path:path, message:'值不在枚举范围内', severity:'error'});
  if (typeof data === 'number') {
    if (schema.minimum !== undefined && data < schema.minimum) errors.push({path:path, message:'值 ' + data + ' < 最小值 ' + schema.minimum, severity:'error'});
    if (schema.maximum !== undefined && data > schema.maximum) errors.push({path:path, message:'值 ' + data + ' > 最大值 ' + schema.maximum, severity:'error'});
  }
  if (typeof data === 'string') {
    if (schema.minLength !== undefined && data.length < schema.minLength) errors.push({path:path, message:'长度 ' + data.length + ' < 最小长度 ' + schema.minLength, severity:'error'});
    if (schema.maxLength !== undefined && data.length > schema.maxLength) errors.push({path:path, message:'长度 ' + data.length + ' > 最大长度 ' + schema.maxLength, severity:'error'});
    if (schema.pattern) {
      try { var re = new RegExp(schema.pattern); if (!re.test(data)) errors.push({path:path, message:'不匹配模式 ' + schema.pattern, severity:'error'}); }
      catch(e) {}
    }
  }
  if (Array.isArray(data)) {
    if (schema.minItems !== undefined && data.length < schema.minItems) errors.push({path:path, message:'数组长度 ' + data.length + ' < 最小项数 ' + schema.minItems, severity:'error'});
    if (schema.maxItems !== undefined && data.length > schema.maxItems) errors.push({path:path, message:'数组长度 ' + data.length + ' > 最大项数 ' + schema.maxItems, severity:'error'});
    if (schema.items && typeof schema.items === 'object') {
      for (var i = 0; i < data.length; i++) errors = errors.concat(validateSchema(data[i], schema.items, buildPath(path, i)));
    }
    if (schema.uniqueItems && new Set(data).size !== data.length) errors.push({path:path, message:'数组含重复项', severity:'error'});
  }
  if (data && typeof data === 'object' && !Array.isArray(data)) {
    if (schema.required) {
      for (var ri = 0; ri < schema.required.length; ri++) {
        if (!Object.prototype.hasOwnProperty.call(data, schema.required[ri])) {
          errors.push({path:path, message:'缺少必填字段: ' + schema.required[ri], severity:'error'});
        }
      }
    }
    if (schema.properties) {
      var pks = Object.keys(schema.properties);
      for (var pi = 0; pi < pks.length; pi++) {
        if (Object.prototype.hasOwnProperty.call(data, pks[pi])) {
          errors = errors.concat(validateSchema(data[pks[pi]], schema.properties[pks[pi]], buildPath(path, pks[pi])));
        }
      }
    }
    if (schema.additionalProperties === false && schema.properties) {
      var ps = new Set(Object.keys(schema.properties));
      var dks = Object.keys(data);
      for (var ai = 0; ai < dks.length; ai++) if (!ps.has(dks[ai])) errors.push({path:buildPath(path, dks[ai]), message:'不允许的额外属性: ' + dks[ai], severity:'warning'});
    } else if (schema.additionalProperties && typeof schema.additionalProperties === 'object' && schema.properties) {
      var ps2 = new Set(Object.keys(schema.properties));
      var dks2 = Object.keys(data);
      for (var aj = 0; aj < dks2.length; aj++) if (!ps2.has(dks2[aj])) errors = errors.concat(validateSchema(data[dks2[aj]], schema.additionalProperties, buildPath(path, dks2[aj])));
    }
  }
  return errors;
}

function runSchemaValidation(updateStatus) {
  state.schemaErrors.clear();
  state.schemaSyntaxError = null;
  if (!state.schema) { render(); updateIssuesList(); if (updateStatus !== false) updateSchemaStatus(); return; }
  var errors = validateSchema(state.data, state.schema, 'root');
  for (var i = 0; i < errors.length; i++) {
    var p = errors[i].path;
    if (!state.schemaErrors.has(p)) state.schemaErrors.set(p, []);
    state.schemaErrors.get(p).push(errors[i]);
  }
  render(); updateIssuesList();
  if (updateStatus !== false) updateSchemaStatus();
}

function updateSchemaStatus() {
  if (!schemaInputEl.value.trim()) {
    schemaStatusEl.textContent = ''; schemaStatusEl.className = 'schema-status'; return;
  }
  if (state.schemaSyntaxError) {
    schemaStatusEl.textContent = '✗ Schema 语法错误';
    schemaStatusEl.className = 'schema-status err'; return;
  }
  if (!state.schema) {
    schemaStatusEl.textContent = ''; schemaStatusEl.className = 'schema-status'; return;
  }
  var total = 0;
  state.schemaErrors.forEach(function(v){total += v.length});
  if (total === 0) { schemaStatusEl.textContent = '✓ 校验通过'; schemaStatusEl.className = 'schema-status ok'; }
  else { schemaStatusEl.textContent = '✗ 发现 ' + total + ' 个问题'; schemaStatusEl.className = 'schema-status err'; }
}

function classifyError(msg) {
  if (/类型应为/.test(msg) || /实际为/.test(msg)) return 'type';
  if (/缺少必填/.test(msg)) return 'required';
  if (/额外属性|不允许/.test(msg)) return 'additional';
  if (/枚举范围/.test(msg)) return 'enum';
  if (/最小|最大|长度|项数|重复/.test(msg)) return 'constraint';
  return 'other';
}
var errorGroupLabels = {
  type: {label: '类型错误', cls: 'g-type'},
  required: {label: '缺少必填字段', cls: 'g-required'},
  additional: {label: '额外字段', cls: 'g-additional'},
  enum: {label: '枚举约束', cls: 'g-enum'},
  constraint: {label: '值约束', cls: 'g-constraint'},
  other: {label: '其他', cls: 'g-other'}
};
function updateIssuesList() {
  if (state.schemaSyntaxError) {
    issuesBodyEl.innerHTML = '<div class="schema-syntax-error"><strong>⚠ Schema 语法错误</strong><br>' + escapeHtml(state.schemaSyntaxError) + '</div>';
    badgeIssues.style.display = 'inline-flex';

  }

  var all = [];

  if (all.length === 0) {

  var groups = {};
  for (var i = 0; i < all.length; i++) {

    if (!groups[cat]) groups[cat] = [];

  }

  var html = '';
  var order = ['type', 'required', 'additional', 'enum', 'constraint', 'other'];
  for (var gi = 0; gi < order.length; gi++) {

      '<span>▸ ' + escapeHtml(gl.label) + '</span>' +
      '<span class="schema-group-count">' + items.length + '</span></div>';
    html += '<div class="schema-group-body" data-group-body="' + gk + '">';
    for (var j = 0; j < items.length; j++) {
      var e = items[j];
      html += '<div class="schema-issue' + (e.severity === 'warning' ? ' warning' : '') + '" data-path="' + escapeHtml(e.path) + '">' +
        '<div class="si-msg">' + escapeHtml(e.message) + '</div>' +
        '<div class="si-path">' + escapeHtml(pathToDisplay(e.path)) + '</div></div>';
    }
    html += '</div></div>';
  }
  issuesBodyEl.innerHTML = html;
  issuesBodyEl.querySelectorAll('.schema-group-header').forEach(function(h) {
    h.addEventListener('click', function(e) {

    });

    el.addEventListener('click', function() {

function computeDiff() {
  state.diffMap.clear();
  if (!state.savedSnapshot) { updateDiffList(); return; }
  diffRecursive(state.savedSnapshot, state.data, 'root');
  applyDiffHighlights();
  updateDiffList();
}
function diffRecursive(oldVal, newVal, path) {
  var oldT = getType(oldVal), newT = getType(newVal);
  if (oldT !== newT) { state.diffMap.set(path, 'modified'); return; }
  if (oldT !== 'object' && oldT !== 'array') {
    if (oldVal !== newVal) state.diffMap.set(path, 'modified');
    return;
  }
  if (oldT === 'array' && newT === 'array') {
    diffArray(oldVal, newVal, path);
    return;
  }
  var oldKeys = oldVal ? Object.keys(oldVal) : [];
  var newKeys = newVal ? Object.keys(newVal) : [];
  var allKeys = new Set(oldKeys.concat(newKeys));
  var changed2 = false;
  allKeys.forEach(function(k) {
    var cp2 = buildPath(path, k);
    var inOld = oldKeys.indexOf(k) !== -1;
    var inNew = newKeys.indexOf(k) !== -1;
    if (inOld && !inNew) { state.diffMap.set(cp2, 'removed'); changed2 = true; markDescRemoved(oldVal[k], cp2); }
    else if (!inOld && inNew) { state.diffMap.set(cp2, 'added'); changed2 = true; }
    else {
      diffRecursive(oldVal[k], newVal[k], cp2);
      if (state.diffMap.has(cp2)) changed2 = true;
    }
  });
  if (changed2 && !state.diffMap.has(path)) state.diffMap.set(path, 'modified');
}
function diffArray(oldArr, newArr, path) {
  var m = oldArr.length, n = newArr.length;
  var dp = [];
  for (var i = 0; i <= m; i++) { dp[i] = []; for (var j = 0; j <= n; j++) dp[i][j] = 0; }
  for (var i2 = 1; i2 <= m; i2++) {
    for (var j2 = 1; j2 <= n; j2++) {
      if (JSON.stringify(oldArr[i2-1]) === JSON.stringify(newArr[j2-1])) dp[i2][j2] = dp[i2-1][j2-1] + 1;
      else dp[i2][j2] = Math.max(dp[i2-1][j2], dp[i2][j2-1]);
    }
  }
  var i3 = m, j3 = n, ops = [];
  while (i3 > 0 || j3 > 0) {
    if (i3 > 0 && j3 > 0 && JSON.stringify(oldArr[i3-1]) === JSON.stringify(newArr[j3-1])) {
      ops.push({type:'keep', oi:i3-1, ni:j3-1}); i3--; j3--;
    } else if (j3 > 0 && (i3 === 0 || dp[i3][j3-1] >= dp[i3-1][j3])) {
      ops.push({type:'add', ni:j3-1}); j3--;
    } else {
      ops.push({type:'remove', oi:i3-1}); i3--;
    }
  }
  ops.reverse();
  var changed = false;
  for (var k = 0; k < ops.length; k++) {
    var op = ops[k];
    if (op.type === 'remove') {
      var cp = buildPath(path, op.oi);
      state.diffMap.set(cp, 'removed');
      markDescRemoved(oldArr[op.oi], cp);
      changed = true;
    } else if (op.type === 'add') {
      var cp2 = buildPath(path, op.ni);
      state.diffMap.set(cp2, 'added');
      markDescAdded(newArr[op.ni], cp2);
      changed = true;
    } else {
      var cp3 = buildPath(path, op.ni);
      diffRecursive(oldArr[op.oi], newArr[op.ni], cp3);
      if (state.diffMap.has(cp3)) changed = true;
    }
  }
  if (changed && !state.diffMap.has(path)) state.diffMap.set(path, 'modified');
}
function markDescAdded(val, path) {
  if (val && typeof val === 'object') {
    if (Array.isArray(val)) for (var i = 0; i < val.length; i++) {
      var cp = buildPath(path, i);
      state.diffMap.set(cp, 'added');
      markDescAdded(val[i], cp);
    } else {
      var ks = Object.keys(val);
      for (var j = 0; j < ks.length; j++) {
        var cp2 = buildPath(path, ks[j]);
        state.diffMap.set(cp2, 'added');
        markDescAdded(val[ks[j]], cp2);
      }
    }
  }
}
function markDescRemoved(val, path) {
  if (val && typeof val === 'object') {
    if (Array.isArray(val)) for (var i = 0; i < val.length; i++) {
      var cp = buildPath(path, i);
      state.diffMap.set(cp, 'removed');
      markDescRemoved(val[i], cp);
    } else {
      var ks = Object.keys(val);
      for (var j = 0; j < ks.length; j++) {
        var cp2 = buildPath(path, ks[j]);
        state.diffMap.set(cp2, 'removed');
        markDescRemoved(val[ks[j]], cp2);
      }
    }
  }
}
function applyDiffHighlights() {
  document.querySelectorAll('.tree-node').forEach(function(n) {
    n.classList.remove('diff-added','diff-modified','diff-removed');
    var dm = n.querySelector('.diff-marker');
    if (dm) dm.remove();
  });
  if (!state.savedSnapshot) return;
  state.diffMap.forEach(function(type, path) {
    var n = getNodeByPath(path);
    if (!n) return;
    n.classList.add('diff-' + type);
    if (!n.querySelector('.diff-marker')) {
      var m = document.createElement('div');
      m.className = 'diff-marker ' + type;
      n.insertBefore(m, n.firstChild);
    }
  });
}
var diffFilterState = {type: 'all', keyword: '', activePath: null};
function updateDiffList() {
  if (!state.savedSnapshot) {
    diffBodyEl.innerHTML = '<div class="history-empty">尚未保存基准版本<br>点击「💾 保存」后即可对比</div>';
    badgeDiff.style.display = 'none'; return;
  }
  var entries = [];
  state.diffMap.forEach(function(type, path){entries.push({type:type, path:path})});
  if (entries.length === 0) {
    diffBodyEl.innerHTML = '<div class="schema-empty">✓ 与上次保存完全一致</div>';
    badgeDiff.style.display = 'inline-flex';
    badgeDiff.textContent = '🔍 无变更';
    return;
  }
  badgeDiff.style.display = 'inline-flex';
  badgeDiff.textContent = '🔍 ' + entries.length + ' 变更';

  var counts = {added:0, modified:0, removed:0};
  entries.forEach(function(e){counts[e.type]++});

  var html = '<div class="diff-filters">';
  html += '<span class="diff-filter-btn active" data-filter="all">全部 ' + entries.length + '</span>';
  if (counts.added) html += '<span class="diff-filter-btn f-added" data-filter="added">+新增 ' + counts.added + '</span>';
  if (counts.modified) html += '<span class="diff-filter-btn f-modified" data-filter="modified">~修改 ' + counts.modified + '</span>';
  if (counts.removed) html += '<span class="diff-filter-btn f-removed" data-filter="removed">-删除 ' + counts.removed + '</span>';
  html += '</div>';
  html += '<input class="diff-filter-input" id="diff-keyword" placeholder="按路径筛选…" value="' + escapeHtml(diffFilterState.keyword) + '">';
  html += '<div class="diff-batch">';
  html += '<button class="btn btn-sm" id="diff-batch-locate">📍 批量定位</button>';
  html += '<button class="btn btn-sm" id="diff-batch-copy-paths">📋 路径清单</button>';
  html += '<button class="btn btn-sm" id="diff-batch-export">📄 导出报告</button>';
  html += '</div>';
  html += '<div id="diff-items-container">';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var label = e.type === 'added' ? '新增' : (e.type === 'modified' ? '修改' : '删除');
    html += '<div class="diff-panel-item ' + e.type + '" data-path="' + escapeHtml(e.path) + '" data-diff-type="' + e.type + '">' +
      '<span class="dp-type">' + label + '</span>' +
      '<span class="dp-path">' + escapeHtml(pathToDisplay(e.path)) + '</span></div>';
  }
  html += '</div>';
  diffBodyEl.innerHTML = html;

  applyDiffFilters();

  diffBodyEl.querySelectorAll('.diff-filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      diffBodyEl.querySelectorAll('.diff-filter-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      diffFilterState.type = btn.dataset.filter;
      applyDiffFilters();
    });
  });
  var keywordInput = document.getElementById('diff-keyword');
  if (keywordInput) keywordInput.addEventListener('input', function() {
    diffFilterState.keyword = this.value.trim().toLowerCase();
    applyDiffFilters();
  });
  var batchLocate = document.getElementById('diff-batch-locate');
  if (batchLocate) batchLocate.addEventListener('click', function() {
    var visible = getFilteredDiffEntries();
    if (visible.length === 0) { showTemp('无可见变更条目', false); return; }
    visible.forEach(function(e) { expandToPath(e.path); });
    render();
    showTemp('✓ 已展开 ' + visible.length + ' 条变更路径', true);
  });
  var batchCopy = document.getElementById('diff-batch-copy-paths');
  if (batchCopy) batchCopy.addEventListener('click', function() {
    var visible = getFilteredDiffEntries();
    if (visible.length === 0) { showTemp('无可见变更条目', false); return; }
    var lines = visible.map(function(e) {
      var label = e.type === 'added' ? '[+]' : (e.type === 'modified' ? '[~]' : '[-]');
      return label + ' ' + pathToDisplay(e.path);
    });
    navigator.clipboard.writeText(lines.join('\n')).then(function(){showTemp('✓ 已复制 ' + lines.length + ' 条路径', true)});
  });
  var batchExport = document.getElementById('diff-batch-export');
  if (batchExport) batchExport.addEventListener('click', exportDiffReport);

  diffBodyEl.querySelectorAll('.diff-panel-item').forEach(function(el) {
    el.addEventListener('click', function() {
      var p = el.dataset.path;
      diffFilterState.activePath = p;
      navigateToPath(p);
      highlightActiveDiffItem();
    });
  });
  if (diffFilterState.activePath) highlightActiveDiffItem();
}
function getFilteredDiffEntries() {
  var entries = [];
  state.diffMap.forEach(function(type, path){entries.push({type:type, path:path})});
  return entries.filter(function(e) {
    if (diffFilterState.type !== 'all' && e.type !== diffFilterState.type) return false;
    if (diffFilterState.keyword && pathToDisplay(e.path).toLowerCase().indexOf(diffFilterState.keyword) === -1) return false;
    return true;
  });
}
function applyDiffFilters() {
  var items = diffBodyEl.querySelectorAll('.diff-panel-item');
  items.forEach(function(el) {
    var t = el.dataset.diffType;
    var p = el.dataset.path;
    var display = pathToDisplay(p).toLowerCase();
    var typeOk = diffFilterState.type === 'all' || t === diffFilterState.type;
    var kwOk = !diffFilterState.keyword || display.indexOf(diffFilterState.keyword) !== -1;
    el.style.display = (typeOk && kwOk) ? '' : 'none';
  });
}
function highlightActiveDiffItem() {
  diffBodyEl.querySelectorAll('.diff-panel-item').forEach(function(el) {
    el.classList.remove('diff-active-highlight');
    if (el.dataset.path === diffFilterState.activePath) el.classList.add('diff-active-highlight');
  });
}
function exportDiffReport() {
  var entries = [];
  state.diffMap.forEach(function(type, path){entries.push({type:type, path:path})});
  if (entries.length === 0) { showTemp('无变更可导出', false); return; }
  var report = {
    title: 'JSON 配置差异报告',
    generatedAt: new Date().toISOString(),
    totalChanges: entries.length,
    summary: {added: 0, modified: 0, removed: 0},
    changes: []
  };
  entries.forEach(function(e) {
    report.summary[e.type]++;
    var item = {type: e.type, path: pathToDisplay(e.path), internalPath: e.path};
    if (e.type === 'removed') {
      var oldVal = getOldValueAtPath(e.path);
      item.oldValue = oldVal;
    } else if (e.type === 'added') {
      try { item.newValue = getValueAtPath(e.path); } catch(ex) {}
    } else {
      try {
        item.oldValue = getOldValueAtPath(e.path);
        item.newValue = getValueAtPath(e.path);
      } catch(ex) {}
    }
    report.changes.push(item);
  });
  var blob = new Blob([JSON.stringify(report, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'diff-report-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showTemp('✓ 已导出差异报告', true);
}

var searchDebounceTimer = null;
function performSearch(query) {
  state.searchMatches = []; state.searchCurrentIdx = -1;
  if (!query) {
    searchResultsEl.classList.remove('show'); searchBadgeEl.style.display = 'none';
    applySearchHighlights(); return;
  }
  var lq = query.toLowerCase();
  var results = [];
  function walk(value, path, key) {
    if (results.length >= 200) return;
    var display = pathToDisplay(path);
    var keyStr = key !== null ? String(key) : '';
    var valStr = value === null ? 'null' : (typeof value === 'object' ? JSON.stringify(value) : String(value));
    if (keyStr.toLowerCase().indexOf(lq) !== -1 || valStr.toLowerCase().indexOf(lq) !== -1 || display.toLowerCase().indexOf(lq) !== -1) {
      results.push({path:path, key:keyStr, preview:valStr.length > 55 ? valStr.substring(0,55) + '…' : valStr, display:display});
    }
    if (value && typeof value === 'object' && results.length < 200) {
      var entries = Array.isArray(value)
        ? value.map(function(v,i){return [i,v]})
        : Object.keys(value).map(function(k){return [k,value[k]]});
      for (var i = 0; i < entries.length && results.length < 200; i++) walk(entries[i][1], buildPath(path, entries[i][0]), entries[i][0]);
    }
  }
  walk(state.data, 'root', null);
  state.searchMatches = results;
  searchBadgeEl.style.display = results.length > 0 ? 'inline' : 'none';
  searchBadgeEl.textContent = results.length;
  searchResultsEl.innerHTML = '';
  if (results.length === 0) { searchResultsEl.classList.remove('show'); applySearchHighlights(); return; }
  for (var i = 0; i < results.length; i++) {
    (function(r, idx) {
      var item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = '<span class="search-result-path">' + escapeHtml(r.display) + '</span><span class="search-result-preview">' + escapeHtml(r.preview) + '</span>';
      item.addEventListener('click', function() {
        navigateToPath(r.path);
        state.searchCurrentIdx = idx;
        applySearchHighlights();
      });
      searchResultsEl.appendChild(item);
    })(results[i], i);
  }
  searchResultsEl.classList.add('show');
  applySearchHighlights();
}
function applySearchHighlights() {
  document.querySelectorAll('.tree-node').forEach(function(n) {
    n.classList.remove('search-highlight','search-highlight-current');
  });
  if (state.searchMatches.length === 0) return;
  for (var i = 0; i < state.searchMatches.length; i++) {
    var node = getNodeByPath(state.searchMatches[i].path);
    if (node) node.classList.add('search-highlight');
  }
  if (state.searchCurrentIdx >= 0 && state.searchCurrentIdx < state.searchMatches.length) {
    var cur = getNodeByPath(state.searchMatches[state.searchCurrentIdx].path);
    if (cur) { cur.classList.add('search-highlight-current'); cur.scrollIntoView({behavior:'smooth', block:'center'}); }
  }
}
function getNodeByPath(path) {
  var nodes = document.querySelectorAll('.tree-node');
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].dataset.path === path) return nodes[i];
  }
  return null;
}
function navigateToPath(path) {
  expandToPath(path);
  render();
  requestAnimationFrame(function() {
    var node = getNodeByPath(path);
    if (node) {
      node.scrollIntoView({behavior:'smooth', block:'center'});
      node.style.transition = 'background .3s';
      node.style.background = 'rgba(137,180,250,0.2)';
      setTimeout(function(){node.style.background = '';}, 1400);
    }
  });
  document.querySelectorAll('.diff-active-highlight').forEach(function(el){el.classList.remove('diff-active-highlight')});
}
function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function closeAllPanels() {
  document.querySelectorAll('.side-panel').forEach(function(p){p.classList.remove('open')});
}

function bindEvents() {
  document.addEventListener('click', function() { hideContextMenu(); pathEl.textContent = '$'; });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      hideContextMenu(); hideErrorBanner(); searchResultsEl.classList.remove('show'); closeAllPanels();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f') {
      e.preventDefault(); searchInputEl.focus(); searchInputEl.select();
    }
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key.toLowerCase() === 'z') {
      e.preventDefault(); undo();
    }
    if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
      e.preventDefault(); redo();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
      e.preventDefault(); saveCurrentJson();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'o') {
      e.preventDefault(); fileInputEl.click();
    }
  });
  treeEl.addEventListener('mousemove', function(e) {
    var n = e.target.closest('.tree-node');
    if (n) pathEl.textContent = pathToDisplay(n.dataset.path);
  });

  rawJsonEl.addEventListener('input', function() {
    clearTimeout(rawJsonInputTimer);
    rawJsonInputTimer = setTimeout(function() {
      try {
        var parsed = JSON.parse(rawJsonEl.value);
        suppressHistory = true;
        state.data = parsed;
        state.expanded = new Set(['root']);
        expandAllChildren('root', state.data);
        suppressHistory = false;
        pushHistory('从原始 JSON 更新');
        rawJsonEl.style.color = '#cdd6f4';
        render();
        hideErrorBanner();
        if (state.schema) runSchemaValidation(false);
        computeDiff();
      } catch(err) {
        rawJsonEl.style.color = '#f38ba8';
      }
    }, 600);
  });
  rawJsonEl.addEventListener('blur', function() {
    try { JSON.parse(rawJsonEl.value); hideErrorBanner(); }
    catch(err) { showErrorBanner('JSON 语法错误: ' + err.message, 'root'); }
  });

  document.getElementById('btn-expand-all').addEventListener('click', function() {
    state.expanded = new Set(['root']); expandAllChildren('root', state.data); render();
  });
  document.getElementById('btn-collapse-all').addEventListener('click', function() {
    state.expanded = new Set(); render();
  });
  document.getElementById('btn-format').addEventListener('click', function() {
    try {
      var oldVal = rawJsonEl.value;
      state.data = JSON.parse(rawJsonEl.value);
      state.expanded = new Set(['root']); expandAllChildren('root', state.data);
      render(); syncRawJson(); showTemp('✓ 已格式化', true);
      if (oldVal !== rawJsonEl.value) pushHistory('格式化 JSON');
    } catch(err) { showErrorBanner('无法格式化: ' + err.message, 'root'); }
  });
  document.getElementById('btn-clear').addEventListener('click', function() {
    if (!confirm('确认清空所有数据?')) return;
    setData({}, '清空数据', true);
  });
  document.getElementById('btn-sample').addEventListener('click', function() {
    setData(JSON.parse(JSON.stringify(SAMPLE_JSON)), '加载示例数据', true);
    showTemp('✓ 已加载示例数据（含特殊键名）', true);
  });
  document.getElementById('schema-toggle').addEventListener('click', function() {
    schemaPanelEl.classList.toggle('open');
    this.textContent = schemaPanelEl.classList.contains('open') ? '▼ Schema' : '▶ Schema';
  });
  document.getElementById('btn-validate').addEventListener('click', function() {
    var text = schemaInputEl.value.trim();
    if (!text) {
      state.schema = null; state.schemaErrors.clear(); state.schemaSyntaxError = null;
      schemaStatusEl.textContent = ''; schemaStatusEl.className = 'schema-status';
      render(); return;
    }
    try {
      state.schema = JSON.parse(text);
      state.schemaSyntaxError = null;
      runSchemaValidation();
    } catch(err) {
      state.schema = null;
      state.schemaErrors.clear();
      state.schemaSyntaxError = err.message;
      schemaStatusEl.textContent = '✗ Schema 语法错误';
      schemaStatusEl.className = 'schema-status err';
      render();
    }
  });
  document.getElementById('btn-clear-schema').addEventListener('click', function() {
    schemaInputEl.value = ''; state.schema = null;
    state.schemaErrors.clear(); state.schemaSyntaxError = null;
    schemaStatusEl.textContent = ''; schemaStatusEl.className = 'schema-status';
    render();
  });

  searchInputEl.addEventListener('input', function() {
    clearTimeout(searchDebounceTimer);
    var q = searchInputEl.value.trim();
    if (!q) { performSearch(''); return; }
    searchDebounceTimer = setTimeout(function(){performSearch(q);}, 250);
  });
  searchInputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (state.searchMatches.length === 0) return;
      if (e.shiftKey) state.searchCurrentIdx = (state.searchCurrentIdx - 1 + state.searchMatches.length) % state.searchMatches.length;
      else state.searchCurrentIdx = (state.searchCurrentIdx + 1) % state.searchMatches.length;
      navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
      applySearchHighlights();
    }
    if (e.key === 'Escape') { searchInputEl.value = ''; performSearch(''); searchResultsEl.classList.remove('show'); }
  });
  document.getElementById('search-prev').addEventListener('click', function() {
    if (state.searchMatches.length === 0) return;
    state.searchCurrentIdx = (state.searchCurrentIdx - 1 + state.searchMatches.length) % state.searchMatches.length;
    navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
    applySearchHighlights();
  });
  document.getElementById('search-next').addEventListener('click', function() {
    if (state.searchMatches.length === 0) return;
    state.searchCurrentIdx = (state.searchCurrentIdx + 1) % state.searchMatches.length;
    navigateToPath(state.searchMatches[state.searchCurrentIdx].path);
    applySearchHighlights();
  });
  document.getElementById('search-clear').addEventListener('click', function() {
    searchInputEl.value = ''; performSearch(''); searchResultsEl.classList.remove('show'); searchBadgeEl.style.display = 'none';
  });
  document.addEventListener('click', function(e) {
    if (!document.getElementById('search-box').contains(e.target)) searchResultsEl.classList.remove('show');
  });

  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-history').addEventListener('click', function() {
    closeAllPanels(); document.getElementById('history-panel').classList.add('open');
  });
  document.getElementById('btn-issues').addEventListener('click', function() {
    closeAllPanels(); document.getElementById('issues-panel').classList.add('open');
  });
  document.getElementById('btn-diff').addEventListener('click', function() {
    closeAllPanels(); document.getElementById('diff-panel').classList.add('open');
  });
  document.querySelectorAll('.panel-close').forEach(function(b) {
    b.addEventListener('click', function() { document.getElementById(b.dataset.panel).classList.remove('open'); });
  });
  badgeIssues.addEventListener('click', function() {
    closeAllPanels(); document.getElementById('issues-panel').classList.add('open');
  });
  badgeHistory.addEventListener('click', function() {
    closeAllPanels(); document.getElementById('history-panel').classList.add('open');
  });
  badgeDiff.addEventListener('click', function() {
    closeAllPanels(); document.getElementById('diff-panel').classList.add('open');
  });

  document.getElementById('btn-open').addEventListener('click', function(){fileInputEl.click()});
  fileInputEl.addEventListener('change', function(e) {
    var f = e.target.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function() {
      try {
        var text = reader.result;
        var isWorkspace = f.name.endsWith('.workspace.json');
        if (isWorkspace) {
          var ws = JSON.parse(text);
          if (!ws || typeof ws !== 'object' || ws.__type !== 'json-workspace') throw new Error('无效的工作区文件');
          history.stack = [];
          history.index = -1;
          state.data = ws.data || {};
          state.expanded = new Set(ws.expanded || ['root']);
          state.schema = ws.schema || null;
          state.schemaSyntaxError = null;
          schemaInputEl.value = ws.schemaText || '';
          searchInputEl.value = ws.search || '';
          state.savedSnapshot = ws.savedSnapshot || null;
          state.schemaErrors.clear();
          state.searchMatches = [];
          state.searchCurrentIdx = -1;
          if (state.schema) runSchemaValidation(false);
          render(); syncRawJson(); applySearchIfNeeded(); computeDiff();
          pushHistory('加载工作区: ' + f.name);
          updateHistoryUI(); updateUndoRedoButtons();
          showTemp('✓ 工作区已加载: ' + f.name, true);
        } else {
          var data = JSON.parse(text);
          setData(data, '打开文件: ' + f.name, true);
          showTemp('✓ 文件已加载: ' + f.name, true);
        }
      } catch(err) {
        showErrorBanner('加载失败: ' + err.message, 'root');
      }
      fileInputEl.value = '';
    };
    reader.readAsText(f);
  });

  function saveCurrentJson() {
    var blob = new Blob([JSON.stringify(state.data, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'data.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    state.savedSnapshot = deepClone(state.data);
    computeDiff();
    showTemp('✓ 已保存为 data.json', true);
  }
  document.getElementById('btn-save').addEventListener('click', saveCurrentJson);

  document.getElementById('btn-save-workspace').addEventListener('click', function() {
    var ws = {
      __type: 'json-workspace',
      __version: 1,
      savedAt: new Date().toISOString(),
      data: state.data,
      expanded: Array.from(state.expanded),
      schema: state.schema || null,
      schemaText: schemaInputEl.value,
      search: searchInputEl.value,
      savedSnapshot: state.savedSnapshot
    };
    var blob = new Blob([JSON.stringify(ws, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'workspace.workspace.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    showTemp('✓ 工作区已保存', true);
  });
  document.getElementById('btn-open-workspace').addEventListener('click', function(){fileInputEl.click()});

  var resizing = false, startY, startHeight;
  resizerEl.addEventListener('mousedown', function(e) {
    resizing = true; resizerEl.classList.add('active');
    startY = e.clientY;
    startHeight = resizerEl.nextElementSibling.offsetHeight;
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!resizing) return;
    var delta = startY - e.clientY;
    var footer = resizerEl.nextElementSibling;
    footer.style.height = Math.min(Math.max(80, startHeight + delta), window.innerHeight * 0.7) + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (resizing) { resizing = false; resizerEl.classList.remove('active'); document.body.style.userSelect = ''; }
  });
}

function init() {
  setData(JSON.parse(JSON.stringify(SAMPLE_JSON)), '初始状态', true);
  bindEvents();
  updateHistoryUI();
  updateUndoRedoButtons();
  updateIssuesList();
  updateDiffList();
}

init();
})();
</script>
</body>
</html>
